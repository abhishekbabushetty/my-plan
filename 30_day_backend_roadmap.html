<html lang="en">
<head>

    <meta name="description" content="A comprehensive, high-octane 110+ day roadmap to mastering backend engineering, distributed systems, and cloud architecture.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Deep Indigo & Cyber Neon */
            --bg-main: #0a0a0f;
            --bg-card: rgba(20, 20, 31, 0.7);
            --bg-card-hover: rgba(30, 30, 46, 0.8);
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #0ea5e9; /* Sky */
            --accent-glow: rgba(99, 102, 241, 0.4);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            
            --border-glow: rgba(99, 102, 241, 0.2);
            --border-dim: rgba(255, 255, 255, 0.08);
            
            --p1: #a855f7; --p1-glow: rgba(168, 85, 247, 0.2);
            --p2: #06b6d4; --p2-glow: rgba(6, 182, 212, 0.2);
            --p3: #f59e0b; --p3-glow: rgba(245, 158, 11, 0.2);
            --p4: #ef4444; --p4-glow: rgba(239, 68, 68, 0.2);
            --p5: #10b981; --p5-glow: rgba(16, 185, 129, 0.2);
            --p6: #f97316; --p6-glow: rgba(249, 115, 22, 0.2);
            --p7: #ec4899; --p7-glow: rgba(236, 72, 153, 0.2);
            
            --diff-brutal: #ff4d4d;
            --diff-hard: #fbbf24;
            --diff-medium: #34d399;
            
            --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains+Mono', monospace;
            
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.15) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Roadmap Grid */
        .phase-group {
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .phase-header:hover {
            border-color: var(--border-glow);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .phase-badge {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .phase-title {
            flex: 1;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .phase-days {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .chevron {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text-tertiary);
        }

        .chevron.open {
            transform: rotate(90deg);
            color: var(--accent-primary);
        }

        /* Days Grid (Accordion Content) */
        .days-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-left: 2rem;
            margin-left: 2rem;
            border-left: 2px solid var(--border-dim);
            margin-top: -1px;
        }

        .days-container.open {
            max-height: 5000px; /* Large enough to fit content */
            margin-top: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            transition: var(--transition);
            overflow: hidden;
        }

        .day-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .day-header {
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
        }

        .day-num {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
            min-width: 60px;
        }

        .day-title {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .day-diff {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            text-transform: uppercase;
        }

        .day-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            padding: 0 1.5rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .day-body.open {
            max-height: 1500px;
            padding-bottom: 1.5rem;
            border-top: 1px solid var(--border-dim);
            padding-top: 1.5rem;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: block;
        }

        .topic-list {
            list-style: none;
            margin-bottom: 2rem;
        }

        .topic-list li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .topic-list li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.6rem;
            width: 6px;
            height: 6px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .challenge-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            border-left: 4px solid var(--accent-primary);
            margin-bottom: 2rem;
        }

        .challenge-box p {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-style: italic;
        }

        .resource-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .res-chip {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .res-chip:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* Specific Phase Colors */
        .p1-badge { background: var(--p1-glow); color: var(--p1); border: 1px solid var(--p1); }
        .p2-badge { background: var(--p2-glow); color: var(--p2); border: 1px solid var(--p2); }
        .p3-badge { background: var(--p3-glow); color: var(--p3); border: 1px solid var(--p3); }
        .p4-badge { background: var(--p4-glow); color: var(--p4); border: 1px solid var(--p4); }
        .p5-badge { background: var(--p5-glow); color: var(--p5); border: 1px solid var(--p5); }
        .p6-badge { background: var(--p6-glow); color: var(--p6); border: 1px solid var(--p6); }
        .p7-badge { background: var(--p7-glow); color: var(--p7); border: 1px solid var(--p7); }

        .diff-brutal { color: var(--diff-brutal); border: 1px solid var(--diff-brutal); background: rgba(255, 77, 77, 0.1); }
        .diff-hard { color: var(--diff-hard); border: 1px solid var(--diff-hard); background: rgba(251, 191, 36, 0.1); }
        .diff-medium { color: var(--diff-medium); border: 1px solid var(--diff-medium); background: rgba(52, 211, 153, 0.1); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        @media (max-width: 768px) {
            .container { padding: 2rem 1rem; }
            .phase-header { padding: 1.2rem; gap: 1rem; }
            .phase-title { font-size: 1.1rem; }
            .days-container { margin-left: 0.5rem; padding-left: 1rem; }
            .day-header { padding: 1rem; gap: 1rem; }
            .day-num { min-width: 45px; }
        }
    </style>
</head>
<body>

        <div id="roadmap"></div>
    </div>

<script>

                    <span class="section-label">Daily Challenge</span>
                    <div class="challenge-box">
                        <p>${day.challenge}</p>
                    </div>

                    <span class="section-label">Curated Resources</span>
                    <div class="resource-grid">${resHtml}</div>
                </div>
            `;
            daysContainer.appendChild(card);
        });

        header.addEventListener('click', () => {
            const ch = document.getElementById(`ch-${phase.id}`);
            const content = document.getElementById(`days-${phase.id}`);
            const isOpen = content.classList.contains('open');
            
            content.classList.toggle('open', !isOpen);
            ch.classList.toggle('open', !isOpen);
        });

        phaseGroup.appendChild(header);
        phaseGroup.appendChild(daysContainer);
        container.appendChild(phaseGroup);
    });
}

function toggleDay(headerEl) {
    const body = headerEl.nextElementSibling;
    const chevron = headerEl.querySelector('.chevron');
    const isOpen = body.classList.contains('open');
    
    body.classList.toggle('open', !isOpen);
    chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

renderRoadmap();
</script>
</body>
</html>
