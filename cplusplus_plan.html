<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate C++ Mastery — 150 Checkpoints</title>
<style>
    :root {
        /* Design System - High-Performance C++ Theme */
        --bg-main: #050508;
        --bg-glass: rgba(15, 15, 24, 0.7);
        --bg-card: rgba(20, 20, 31, 0.4);
        --bg-card-hover: rgba(30, 30, 45, 0.6);
        
        --accent-primary: #3b82f6; /* C++ Excellence Blue */
        --accent-secondary: #8b5cf6; /* Logic Purple */
        --accent-glow: rgba(59, 130, 246, 0.25);
        
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-tertiary: #64748b;
        --text-dim: #475569;
        
        --border-dim: rgba(255, 255, 255, 0.06);
        --border-glow: rgba(59, 130, 246, 0.2);
        
        --green: #10b981;
        --amber: #f59e0b;
        --red: #ef4444;
        --purple: #a78bfa;
        
        --font-sans: 'Outfit', -apple-system, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        
        --radius-xl: 32px;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
    }

    html { scroll-behavior: smooth; }

    body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        min-height: 100vh;
        background-image: 
            radial-gradient(circle at 5% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 30%),
            radial-gradient(circle at 95% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 30%);
    }

    /* HEADER & NAVIGATION */
    .hdr {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(5, 5, 8, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-dim);
        padding: 1.25rem 2rem;
        transition: var(--transition);
    }

    .hdr-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2rem;
        margin-bottom: 1.25rem;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 1.25rem;
    }

    .logo {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-weight: 800;
        font-size: 1.1rem;
        color: white;
        box-shadow: 0 0 20px var(--accent-glow);
    }

    .hdr-title {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(to right, #fff, #94a3b8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hdr-sub {
        font-size: 0.75rem;
        color: var(--text-tertiary);
        font-family: var(--font-mono);
        margin-top: 0.1rem;
        opacity: 0.8;
    }

    .hdr-stats {
        display: flex;
        gap: 2rem;
    }

    .stat {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
    }

    .stat-n {
        font-size: 1.5rem;
        font-weight: 800;
        line-height: 1;
        font-family: var(--font-mono);
    }

    .stat-l {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
        margin-top: 0.3rem;
    }

    /* CONTROLS */
    .hdr-controls {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .srch-wrap {
        position: relative;
        flex: 1;
    }

    .srch-wrap input {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-sm);
        padding: 0.6rem 1rem 0.6rem 2.5rem;
        color: white;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        transition: var(--transition);
    }

    .srch-wrap input:focus {
        outline: none;
        border-color: var(--accent-primary);
        background: rgba(255, 255, 255, 0.06);
    }

    .srch-icon {
        position: absolute;
        left: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-dim);
        font-size: 1rem;
    }

    .btn {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.5rem 1rem;
        cursor: pointer;
        transition: var(--transition);
        white-space: nowrap;
        font-family: var(--font-sans);
    }

    .btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border-color: var(--text-tertiary);
    }

    .btn-filters {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
    }

    .fbtn {
        padding: 0.35rem 0.85rem;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-tertiary);
        background: transparent;
        border: 1px solid var(--border-dim);
        cursor: pointer;
        transition: var(--transition);
        font-family: var(--font-mono);
        text-transform: uppercase;
    }

    .fbtn:hover, .fbtn.active {
        color: white;
        background: var(--accent-primary);
        border-color: var(--accent-primary);
    }

    .fbtn.f-beg.active { background: var(--green); border-color: var(--green); }
    .fbtn.f-int.active { background: var(--amber); border-color: var(--amber); }
    .fbtn.f-exp.active { background: var(--red); border-color: var(--red); }
    .fbtn.f-res.active { background: var(--purple); border-color: var(--purple); }

    .prog-wrap {
        display: flex;
        align-items: center;
        gap: 1.25rem;
    }

    .prog-bar {
        flex: 1;
        height: 4px;
        background: var(--border-dim);
        border-radius: 100px;
        overflow: hidden;
    }

    .prog-fill {
        height: 100%;
        background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary), var(--green));
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .prog-txt {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-dim);
    }

    /* MAIN CONTENT AREA */
    .main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem;
    }

    /* PHASE HEADER */
    .phase-hdr {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        padding: 2.5rem 0 1rem;
        margin-top: 1.5rem;
        border-top: 1px solid var(--border-dim);
    }

    .phase-hdr:first-child {
        padding-top: 0;
        border-top: none;
        margin-top: 0;
    }

    .ph-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        box-shadow: 0 0 10px currentColor;
    }

    .ph-label {
        font-size: 1.25rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        text-transform: uppercase;
    }

    .ph-meta {
        margin-left: auto;
    }

    .ph-count {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.6;
    }

    /* MILESTONE CARDS */
    .milestone {
        background: linear-gradient(135deg, rgba(20, 20, 40, 0.4), rgba(10, 10, 20, 0.5));
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: var(--radius-lg);
        padding: 2rem;
        margin: 1.5rem 0 2rem 3.5rem;
        position: relative;
    }

    .ms-label {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1rem;
        color: var(--accent-primary);
        margin-bottom: 0.75rem;
    }

    .ms-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: white;
    }

    .ms-desc {
        font-size: 0.95rem;
        color: var(--text-secondary);
        margin-bottom: 1.25rem;
    }

    .ms-items {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
    }

    .ms-chip {
        padding: 0.35rem 0.75rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-tertiary);
    }

    /* CHECKPOINT ROWS */
    .cp-row {
        display: flex;
        margin-bottom: 0.25rem;
    }

    .spine {
        width: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        position: relative;
    }

    .cp-num {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        font-family: var(--font-mono);
        z-index: 10;
    }

    .cp-line {
        width: 1px;
        flex: 1;
        background: var(--border-dim);
        margin: 0.4rem 0;
    }

    /* CARDS */
    .card {
        flex: 1;
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: var(--radius-md);
        padding: 1rem 1.5rem;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        margin-bottom: 0.25rem;
        overflow: hidden;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        opacity: 0;
        transition: var(--transition);
    }

    .card:hover {
        background: var(--bg-card-hover);
        border-color: var(--border-glow);
        transform: translateX(4px);
    }

    .card:hover::before {
        opacity: 1;
    }

    .card.done {
        opacity: 0.5;
        background: rgba(16, 185, 129, 0.05);
    }

    .card-top {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .cp-title {
        flex: 1;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        min-width: 150px;
    }

    .cp-tag {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        opacity: 0.9;
    }

    .diff {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-family: var(--font-mono);
    }

    .diff-B { color: var(--green); border: 1px solid rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.1); }
    .diff-I { color: var(--amber); border: 1px solid rgba(245, 158, 11, 0.2); background: rgba(245, 158, 11, 0.1); }
    .diff-E { color: var(--red); border: 1px solid rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.1); }
    .diff-R { color: var(--purple); border: 1px solid rgba(167, 139, 250, 0.2); background: rgba(167, 139, 250, 0.1); }

    .time-badge {
        font-size: 0.7rem;
        color: var(--text-tertiary);
        font-family: var(--font-mono);
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    .done-btn {
        width: 18px;
        height: 18px;
        border: 1.5px solid var(--border-dim);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: transparent;
        font-size: 0.7rem;
        cursor: pointer;
        transition: var(--transition);
    }

    .done-btn:hover {
        border-color: var(--green);
    }

    .done-btn.on {
        background: var(--green);
        border-color: var(--green);
        color: white;
    }

    .chev {
        color: var(--text-dim);
        transition: var(--transition);
        font-size: 0.7rem;
    }

    .chev.open {
        transform: rotate(90deg);
        color: var(--accent-primary);
    }

    .cp-topics {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-tertiary);
        margin-top: 0.4rem;
        opacity: 0.8;
    }

    /* EXPAND CONTENT */
    .expand {
        display: none;
        margin-top: 1.25rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border-dim);
    }

    .expand.open {
        display: block;
    }

    .sec-label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1rem;
        color: var(--text-tertiary);
        margin-bottom: 0.6rem;
        margin-top: 1.25rem;
    }

    .sec-label:first-child { margin-top: 0; }

    .prereq-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
    }

    .prereq-chip {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        padding: 0.2rem 0.6rem;
        background: rgba(59, 130, 246, 0.1);
        color: var(--accent-primary);
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 4px;
        cursor: pointer;
    }

    .study-text {
        font-size: 0.9rem;
        color: var(--text-secondary);
        line-height: 1.7;
        margin-bottom: 1.25rem;
    }

    .concept-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
    }

    .concept {
        padding: 0.2rem 0.5rem;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border-dim);
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-tertiary);
    }

    .tasks-wrap {
        display: flex;
        flex-direction: column;
    }

    .task {
        display: flex;
        gap: 1rem;
        padding: 0.6rem 0;
        border-bottom: 1px solid var(--border-dim);
    }

    .task:last-child { border-bottom: none; }

    .verb {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        font-weight: 800;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        color: white;
        min-width: 65px;
        text-align: center;
        text-transform: uppercase;
    }

    .tdesc {
        font-size: 0.9rem;
        color: var(--text-primary);
    }

    /* CAPSTONE */
    .capstone-box {
        margin-top: 4rem;
        padding: 2.5rem;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), rgba(139, 92, 246, 0.05));
        border: 1px solid var(--border-glow);
        border-radius: var(--radius-xl);
    }

    .cap-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: white;
        margin-bottom: 1.5rem;
        text-align: center;
    }

    .cap-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 0.75rem;
    }

    .cap-item {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border-dim);
        padding: 0.85rem 1.25rem;
        border-radius: var(--radius-md);
        font-size: 0.9rem;
        color: var(--text-secondary);
        display: flex;
        gap: 0.75rem;
        align-items: center;
    }

    .cap-item span:first-child { color: var(--accent-primary); font-weight: 800; }

    @media (max-width: 768px) {
        .hdr { padding: 1rem; }
        .hdr-top { flex-direction: column; align-items: flex-start; gap: 1rem; }
        .hdr-stats { gap: 1rem; width: 100%; justify-content: space-between; }
        .main { padding: 1.5rem 1rem; }
        .milestone { margin-left: 0.5rem; padding: 1.5rem; }
        .spine { width: 40px; }
        .cap-grid { grid-template-columns: 1fr; }
        .diff, .time-badge, .cp-tag { display: none; }
    }
</style>
</head>
<body>

<div class="hdr">
    <div class="hdr-top">
        <div class="logo-area">
            <div class="logo">C++</div>
            <div>
                <div class="hdr-title">Ultimate C++ Mastery</div>
                <div class="hdr-sub">Hardware to Production AI • 150 Checkpoints</div>
            </div>
        </div>
        <div class="hdr-stats">
            <div class="stat"><span class="stat-n" id="s-total" style="color:var(--accent-primary)">150</span><span class="stat-l">Checkpoints</span></div>
            <div class="stat"><span class="stat-n" id="s-done" style="color:var(--green)">0</span><span class="stat-l">Completed</span></div>
            <div class="stat"><span class="stat-n" id="s-pct" style="color:var(--amber)">0%</span><span class="stat-l">Progress</span></div>
        </div>
    </div>
    <div class="hdr-controls">
        <div class="srch-wrap">
            <span class="srch-icon">⌕</span>
            <input type="text" id="srch" placeholder="Search concepts, tasks, phases…" oninput="doSearch(this.value)">
        </div>
        <span class="match-cnt" id="match-cnt" style="font-family:var(--font-mono); font-size: 0.75rem; color: var(--text-dim);"></span>
        <button class="btn" onclick="expandAll()">Expand All</button>
        <button class="btn" onclick="collapseAll()">Collapse All</button>
        <button class="btn" onclick="resetAll()">Reset</button>
    </div>
    <div class="btn-filters">
        <span style="font-size:0.75rem; color:var(--text-dim); margin-right: 0.5rem; font-family:var(--font-mono); font-weight:700;">Filter:</span>
        <button class="fbtn f-all active" onclick="setFilter('all',this)">All</button>
        <button class="fbtn f-beg" onclick="setFilter('B',this)">Beginner</button>
        <button class="fbtn f-int" onclick="setFilter('I',this)">Intermediate</button>
        <button class="fbtn f-exp" onclick="setFilter('E',this)">Expert</button>
        <button class="fbtn f-res" onclick="setFilter('R',this)">Research</button>
        <button class="fbtn" onclick="setFilter('todo',this)">⬜ Todo</button>
        <button class="fbtn" onclick="setFilter('done',this)">✅ Done</button>
    </div>
    <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <span class="prog-txt" id="prog-txt">0 / 150</span>
    </div>
</div>

<div class="main" id="root"></div>

<script>
const PHASES = [
// ═══════════════════════════════════════════════════════════
{id:"p0",label:"Phase 0 — Hardware & Machine Foundation",
 col:"#7c6af7",bg:"#14113a",txt:"#a090f5",tag:"Hardware",
 milestone:{title:"Milestone: Binary Inspector Toolkit",desc:"Build CLI tools proving hardware mastery.",items:["printBits<T> for any type","IEEE-754 float inspector","Hex dump (xxd clone)","L1/L2/L3/RAM latency benchmark","False-sharing demo with 5x slowdown"]},
 items:[
{n:1,title:"Binary & Number Systems",diff:"B",time:"3–4 h",prereqs:[],
 concepts:["Base-2/8/16","Binary arithmetic","Overflow detection","BCD","Two's complement preview","Bitwise negation"],
 study:"Everything a computer stores is binary. You MUST convert fluently between decimal, binary, octal, and hex by hand — not just with a calculator. Understand why overflow wraps differently for signed (UB) vs unsigned (defined). BCD is used in low-level date/time chips and embedded hardware. This foundation prevents confusion in every single phase ahead — do not rush this.",
 tasks:[
  ["Write","printBits<T>() — generic template printing the raw binary representation of any type: char, int8_t, uint32_t, float, double, pointer — test ALL types"],
  ["Write","intInspect(n) — prints decimal, hex, octal, binary of same integer in aligned columns; handle negatives correctly"],
  ["Implement","Binary arithmetic by hand: add, subtract, multiply two 8-bit numbers; track carry/borrow; verify against calculator; write unit test"],
  ["Build","Hex dump tool — read any file, output: offset | hex bytes (16 per row) | ASCII printable chars — identical format to xxd"],
  ["Write","BCD encoder/decoder — pack two decimal digits into one byte; decoder must reproduce exact decimal; simulate 7-segment display ASCII art output"]
 ]},
{n:2,title:"Integer Representation & Arithmetic",diff:"B",time:"3–4 h",prereqs:[1],
 concepts:["Unsigned integers","Two's complement","Signed overflow (UB)","Integer promotions","Bit width","Wrap-around","safe_add patterns","Fixed-width types"],
 study:"Two's complement is the universal encoding for all modern CPUs — EVERY negative number follows this rule. Signed integer overflow is Undefined Behavior in C++: compilers exploit this aggressively for optimization (they assume it never happens). Unsigned overflow is well-defined wrap-around. Integer promotions: char+char gives int — this surprises everyone. Know fixed-width types (int32_t, uint64_t) from <cstdint> for portable code.",
 tasks:[
  ["Demonstrate","Two's complement: negate any value by (flip all bits + 1); verify -1=0xFFFF...FFFF; implement negateMyself() template"],
  ["Show","Signed overflow is UB: compile with -fsanitize=undefined; trigger INT_MAX+1; read UBSan output; then show compiler optimizing a loop assuming no overflow"],
  ["Write","Safe arithmetic library: safeAdd<T>, safeSub<T>, safeMul<T> — detect overflow BEFORE it happens; throw or return error_code"],
  ["Implement","128-bit multiply from two 64-bit halves using schoolbook long multiplication; verify (2^63)*(2^63) gives correct result"],
  ["Write","Integer promotion test suite: char+char→int; short*short→int; use decltype to prove types; show promotion in every arithmetic context"]
 ]},
{n:3,title:"Floating Point & IEEE-754",diff:"I",time:"4–5 h",prereqs:[1,2],
 concepts:["Sign/exponent/mantissa","NaN and Infinity","Denormals","Rounding modes","ULP","Epsilon","Kahan summation","Fast math dangers"],
 study:"IEEE-754 defines EXACTLY how floats behave. Key insight: not all decimals are representable — 0.1+0.2≠0.3 and you must understand WHY. NaN propagates through all operations. Denormals are numbers smaller than the minimum normal — they're computed in microcode and are 10-100x slower. ULP (Unit in the Last Place) is the correct measure of floating-point error. This prevents catastrophic numerical bugs in every scientific, financial, and game code you'll ever write.",
 tasks:[
  ["Write","floatInspect(x) — extract and print sign bit, biased exponent, raw mantissa, true exponent, true value for both float and double side-by-side"],
  ["Demonstrate","Precision loss: show 0.1+0.2≠0.3; accumulate 10,000 additions of 0.1; show error grows; explain mantissa bit count limit"],
  ["Implement","Kahan compensated summation; compare accumulated error vs naive sum on 1,000,000 random floats; prove Kahan is orders of magnitude better"],
  ["Build","nextULP(x) and prevULP(x): step one ULP up/down; measure spacing between adjacent floats near 0, near 1, near 1e20"],
  ["Implement","Fast inverse sqrt (Quake III 0x5F3759DF); explain the Newton iteration step; measure error vs sqrtf; benchmark speedup"]
 ]},
{n:4,title:"Bit Manipulation Mastery",diff:"I",time:"4–5 h",prereqs:[1,2],
 concepts:["AND/OR/XOR/NOT/shifts","Bitmasks","SWAR technique","popcount","CLZ/CTZ","Bit tricks","Bitset<N> implementation"],
 study:"Bit manipulation is the language of hardware. Every flag register, network header, packed data format, and permission system uses bits directly. SWAR (SIMD Within A Register) processes 8 bytes simultaneously in one uint64_t operation — a precursor to SIMD. Understanding popcount and CLZ is essential because compilers generate hardware instructions for them. Master this phase and hardware-level code becomes natural.",
 tasks:[
  ["Build","Bit utility library: setBit, clearBit, toggleBit, testBit, extractBits(val,start,len), insertBits(val,field,start,len) — fully unit-tested"],
  ["Implement","countBits (popcount) 4 ways: naive loop, lookup table, Brian Kernighan's trick, __builtin_popcount — benchmark all 4 on 100M calls; show which the compiler picks"],
  ["Write","Bit tricks suite: isPowerOf2, roundUpPow2, log2Floor, reverseBytes32, reverseBits32, swapNibbles, parity, byteReverse64"],
  ["Implement","SWAR space counter: count ASCII spaces in a string by processing 8 bytes/cycle in uint64_t; verify identical results to naive loop; benchmark 10x speedup"],
  ["Build","Bitset<N> template: stores N bits in uint64_t array; set/clear/flip/count/any/all/none/operator[]/operator&/operator|/operator^ — fully correct"]
 ]},
{n:5,title:"Endianness & Data Layout",diff:"I",time:"3–4 h",prereqs:[1,4],
 concepts:["Little/big endian","Network byte order","Struct padding","alignas/alignof","offsetof","ABI portability","Serialization"],
 study:"x86 is little-endian; most network protocols are big-endian (network byte order). Struct fields are padded to their natural alignment — misunderstanding this causes wrong sizeof assumptions, protocol bugs, and security vulnerabilities. This knowledge is mandatory for network programming, file formats, device drivers, and cross-platform code. On embedded systems, wrong endianness assumptions silently corrupt all data.",
 tasks:[
  ["Write","Endian detector: detect byte order at runtime (union trick) AND compile-time (constexpr); print clearly with explanation"],
  ["Implement","byteSwap16/32/64 using ONLY bit shifts and masks — no library calls; then verify same result as __builtin_bswap32"],
  ["Build","Network protocol serializer: define a C++ struct; serialize to big-endian wire bytes; deserialize back; roundtrip test with 1000 random values"],
  ["Demonstrate","Struct padding: write 6 different structs; predict sizeof BEFORE compiling; verify with offsetof; minimize with __attribute__((packed))"],
  ["Write","Cross-platform binary file format: header with magic bytes + version + endian flag; read correctly on both LE and BE machines (test with QEMU)"]
 ]},
{n:6,title:"CPU Execution Model",diff:"I",time:"4–5 h",prereqs:[4,5],
 concepts:["Fetch-decode-execute","Pipeline stages","Data/control hazards","Branch prediction","Out-of-order execution","Speculative execution","IPC","Superscalar"],
 study:"Modern CPUs run at 3–5 GHz but a single branch misprediction wastes 15–20 cycles. Out-of-order execution reorders instructions dynamically. A sorted array in a branchy loop is up to 5x faster than an unsorted one because the branch predictor succeeds. Understanding the execution model transforms how you think about code — you stop thinking in lines of C++ and start thinking in cycles, ports, and pipeline slots.",
 tasks:[
  ["Compile","factorial, fibonacci, matrix multiply with -S -O0 and -O2; diff the assembly; annotate EVERY optimization difference you see"],
  ["Measure","Branch misprediction cost: sorted vs unsorted array with if-branch; use 'perf stat -e branch-misses,branches'; quantify cycles wasted"],
  ["Write","Branchless abs(), min(), max(), clamp() using arithmetic/cmov; verify with objdump that -O2 generates no branch instructions"],
  ["Implement","Branch predictor exploitation: sequential vs random access in a loop; measure throughput; explain prediction table behavior"],
  ["Build","ILP experiment: 4 independent sum accumulators vs 1 serial accumulator; show CPU runs parallel ops; measure 4x throughput improvement"]
 ]},
{n:7,title:"Memory Hierarchy & Cache Architecture",diff:"I",time:"5–6 h",prereqs:[5,6],
 concepts:["Register/L1/L2/L3/RAM latency","Cache lines (64 bytes)","Associativity","TLB","Hardware prefetcher","False sharing","Capacity/conflict/compulsory misses"],
 study:"The latency pyramid: registers ~1 cycle, L1 ~4, L2 ~12, L3 ~40, RAM ~200+ cycles. A cache line is 64 bytes — accessing ONE byte fetches ALL 64. False sharing: two threads writing different variables on the SAME cache line causes the same performance hit as a lock. The hardware prefetcher detects stride patterns and pre-fetches — sequential access is always faster. This is WHY data structure layout dominates algorithmic complexity in real performance work.",
 tasks:[
  ["Build","Pointer-chase latency benchmark: randomly-linked list traversal forcing cache misses; sweep dataset sizes 1KB→1GB; plot L1/L2/L3/RAM latency curve clearly"],
  ["Measure","False sharing: two threads writing adjacent struct fields vs __attribute__((aligned(64))) padded struct; demonstrate ≥5x slowdown; fix and verify"],
  ["Implement","Cache-blocked matrix multiply: naive (N³ cache misses) vs tiled (block=64 bytes); measure L3 miss reduction with perf stat; verify same result"],
  ["Build","TLB thrash benchmark: access array with stride=4KB, 8KB, 16KB; find stride maximally thrashing TLB; measure with perf stat"],
  ["Write","Software prefetch: __builtin_prefetch in pointer-chase loop; measure latency reduction; explain L1/L2/L3 prefetch hints; show assembly diff"]
 ]},
{n:8,title:"MESI Protocol & NUMA",diff:"E",time:"5–6 h",prereqs:[7],
 concepts:["MESI cache coherence states","Modified/Exclusive/Shared/Invalid","Cache-to-cache transfer","NUMA topology","Memory bandwidth asymmetry","numactl","hwloc"],
 study:"In a multi-core system, every cache line has a MESI state. Writing to a Shared line requires invalidating all other copies — this is the invisible overhead that makes naive multithreaded code slow. NUMA (Non-Uniform Memory Access) systems have multiple memory controllers; accessing 'remote' memory costs 2–3x more. This knowledge is essential for writing software that actually scales to 32+ cores.",
 tasks:[
  ["Demonstrate","MESI states: write to a shared variable from two cores; use 'perf stat -e cache-misses,LLC-store-misses' to count RFO events; explain each state transition"],
  ["Measure","Cache-to-cache transfer latency: two threads ping-pong ownership of a cache line; measure round-trip latency; compare to L3 miss"],
  ["Build","NUMA topology reader: parse /proc/cpuinfo and /sys/devices/system/node; print NUMA node layout, CPU assignment, and memory distances"],
  ["Implement","NUMA-aware allocation: allocate large array local to each NUMA node with mbind/numa_alloc_local; compare bandwidth vs remote allocation"],
  ["Benchmark","NUMA local vs remote: allocate on node 0; access from node 1; show bandwidth difference with stream benchmark; explain impact on multithreaded code"]
 ]}
]},

{id:"p1",label:"Phase 1 — C++ Core Language Mastery",
 col:"#4f9ef8",bg:"#0a1428",txt:"#7ab0f7",tag:"Core C++",

 items:[
{n:9,title:"Hello World & Compilation Model",diff:"B",time:"2–3 h",prereqs:[],
 concepts:["main() signature","argc/argv","cout/cin/cerr","Translation units","Preprocessor/compile/assemble/link","-Wall -Wextra -Werror","ODR"],
 study:"The compilation pipeline has four stages: preprocessing (expand macros/includes), compilation (C++ → assembly), assembly (assembly → object file), linking (object files → executable). Each .cpp file is one translation unit. Understanding this prevents 90% of all linker errors. Always compile with -Wall -Wextra -Werror — warnings are pre-errors, and treating them as errors forces clean code.",
 tasks:[
  ["Write","Hello World; extend to read your name from stdin; then from argv[1]; gracefully handle missing arg with helpful error message and exit(1)"],
  ["Compile","With -Wall -Wextra -Werror; deliberately introduce 6 different types of warnings one by one; understand and fix each; explain WHY each is a warning"],
  ["Run","Each stage manually: g++ -E (preprocess → see expanded includes), -S (→ assembly), -c (→ object), ld (→ executable); inspect each output file"],
  ["Write","mini wc clone: count lines, words, bytes from file given as argv[1]; correct exit code (1) on file-not-found; handle empty files"],
  ["Build","Multi-file project: math.h + math.cpp + main.cpp; compile each separately; link; demonstrate what happens when you violate ODR with two definitions"]
 ]},
{n:10,title:"Fundamental Types & Literals",diff:"B",time:"2–3 h",prereqs:[9],
 concepts:["int/long/short/char/unsigned","float/double/long double","bool/void/nullptr_t","sizeof/alignof","numeric_limits<T>","Literal suffixes","auto","Fixed-width types"],
 study:"Know every fundamental type, its guaranteed minimum size, and actual size on your platform. Fixed-width types from <cstdint> give exact sizes for protocol and binary work. Literal suffixes matter: 42u is unsigned (different overflow behavior), 42LL is long long (64-bit), 3.14f is float (may differ from 3.14 double). numeric_limits<T> tells you EVERYTHING about any type's properties.",
 tasks:[
  ["Write","Print sizeof/alignof of EVERY fundamental type; compare x86-64 Linux vs 32-bit (cross-compile with -m32); build aligned table output"],
  ["Explore","numeric_limits<T>: for every numeric type print min, max, epsilon, infinity, is_signed, is_exact, digits10, has_quiet_NaN, has_infinity"],
  ["Write","Every literal suffix with proof: 42u, 42L, 42ULL, 3.14f, 1.0L, 0xFF, 0777, 0b1010, 1'000'000, u8'A', L'Ω'; use decltype to prove their types"],
  ["Demonstrate","Implicit narrowing: double→int silently truncates; float→int; int→char; compile with -Wconversion; catch ALL 6 narrowing cases"],
  ["Build","Type inspector program: for each type, print name, sizeof, alignof, min, max, epsilon (if floating), formatted in aligned columns"]
 ]},
{n:11,title:"Variables, Scope & Storage Duration",diff:"B",time:"3–4 h",prereqs:[9,10],
 concepts:["Automatic storage","Static storage","Global variables","thread_local","const vs constexpr","volatile","extern","Block scope","Initialization order fiasco"],
 study:"Storage duration determines WHERE a variable lives and HOW LONG. Automatic = stack (fast, scoped, destroyed on exit). Static = program lifetime (one copy per program). Thread-local = one copy per thread. constexpr forces compile-time evaluation — verify with static_assert to prove it. volatile prevents the optimizer from caching reads — critical for memory-mapped hardware registers. The static initialization order fiasco kills programs silently.",
 tasks:[
  ["Write","Address printer: local, global, static-local, thread-local, heap variable — print each address in hex; explain which memory region each lives in"],
  ["Demonstrate","Static local variable: call counter; prove count survives between calls; explain C++11 thread-safe initialization; show generated guard code in assembly"],
  ["Write","constexpr factorial/fibonacci/pow/string_length — verify each with static_assert; inspect generated code with g++ -S to prove zero runtime overhead"],
  ["Demonstrate","Static initialization order fiasco: two globals in different TUs; one depends on the other; show how it can crash; fix with construct-on-first-use"],
  ["Write","volatile memory-mapped register: volatile uint32_t* reg; write then read; prove with -O2 that compiler cannot eliminate the read; show in assembly"]
 ]},
{n:12,title:"Operators & Expressions",diff:"B",time:"3–4 h",prereqs:[10,11],
 concepts:["All operator categories","Precedence table (18 levels)","Sequence points","Integer promotions","Ternary","Comma operator","sizeof/alignof/typeid","UB in expressions"],
 study:"C++ has 18 operator precedence levels. The trap: a & b == c is parsed as a & (b==c), NOT (a&b)==c. Sequence point rules define when side effects commit — i++ + i++ is undefined behavior because there's no sequence point between the two increments. Integer promotion means char+char gives int. Build a mental model of the precedence table — you'll use it every day.",
 tasks:[
  ["Write","Truth table generator: print all 16 possible binary boolean functions (there are exactly 16) using &&, ||, ^, ! combinations"],
  ["Write","Precedence trap quiz: write 12 tricky expressions (e.g., a&b==c, *p++, !x&y); predict output BEFORE compiling; explain the parse tree for each"],
  ["Implement","Bitmask permission system: 8 permissions (READ/WRITE/EXEC etc) in uint8_t; set/clear/toggle/test/list_active; use named enum constants; print human-readable"],
  ["Demonstrate","Sequence point UB: i++ + i++; f(i++, i++); a[i]=i++; compile with -fsanitize=undefined; show UBSan fires; explain WHY each is UB"],
  ["Build","Expression evaluator: parse arithmetic with correct precedence (+,-,*,/,^,unary-) using recursive descent; support parentheses; 10 test cases"]
 ]},
{n:13,title:"Control Flow",diff:"B",time:"2–3 h",prereqs:[12],
 concepts:["if/else if/else","switch/case/fallthrough","for/while/do-while","break/continue","Range-for desugaring","Structured bindings (C++17)","goto (avoidance)"],
 study:"Range-for desugars to begin()/end() iterator pair — this means ANY type with begin/end works with range-for. Switch fallthrough is intentional and must be marked [[fallthrough]]. Structured bindings (auto [a,b] = pair) are C++17 and eliminate tedious first/second access. Understanding these mechanics lets you write range-for compatible custom types.",
 tasks:[
  ["Implement","Sieve of Eratosthenes: all primes to 1,000,000; optimize inner loop to start at p²; use bit array for storage; count primes and verify with known answer (78,498)"],
  ["Implement","FizzBuzz 3 ways: naive if-chain, pure arithmetic with no branches, compile-time lookup table — compile all three; diff the assembly; explain size/speed tradeoffs"],
  ["Build","Menu-driven bank account: deposit/withdraw/balance/history with do-while+switch; validate all inputs; persist transaction history; print formatted statement"],
  ["Write","Collatz conjecture: count steps to reach 1 for every n in [1,1000]; find maximum steps and which starting number; verify no number exceeds 10,000 steps"],
  ["Implement","Caesar cipher with full range-for: encrypt/decrypt ANY string (utf8 aware for A-Z/a-z); wrap around correctly; auto-detect direction; test 'Hello World' with shift 13"]
 ]},
{n:14,title:"Functions Deep Dive",diff:"B",time:"3–4 h",prereqs:[11,12,13],
 concepts:["Declarations vs definitions","Overload resolution","Default arguments","Inline functions","[[nodiscard]] [[noreturn]] [[likely]]","Tail recursion","Stack frames","Calling conventions preview"],
 study:"Overload resolution is a complex algorithm — the compiler picks the 'best' match through: exact match > promotion > standard conversion > user-defined conversion. [[nodiscard]] forces callers to use return values — essential for error codes that get silently discarded. inline is a linker hint (multiple definitions allowed) not a guarantee. Stack frames make recursion expensive; tail recursion eliminates the frame.",
 tasks:[
  ["Implement","Recursive suite: factorial, fibonacci, GCD, LCM, power, sum-of-digits, reverse-number, is-palindrome — each with explicit base cases and overflow protection"],
  ["Write","Overload set: area() for circle (radius), rectangle (w,h), triangle-Heron (a,b,c), ellipse (a,b) — 4 overloads; verify correct dispatch with static_assert"],
  ["Demonstrate","Default args: connect(host, port=443, timeout=30, retry=3); call with 1,2,3,4 args; show rule: defaults only at end; show why changing default recompiles all callers"],
  ["Write","[[nodiscard]] on FileHandle::open() error code; show compiler warning when ignored; add [[nodiscard(\"check error code\")]] message; write 5 call sites — some correct, some wrong"],
  ["Build","Taylor series math library: sin, cos, exp, ln, sqrt via series; compare accuracy at 5/10/20 terms vs std:: functions; plot error vs term count"]
 ]},
{n:15,title:"Arrays, C-Strings & Raw Memory",diff:"B",time:"4–5 h",prereqs:[10,11],
 concepts:["1D/2D/3D arrays","Array decay to pointer","C-string functions","String literals","memcpy/memmove/memset","sizeof array trick","VLA danger"],
 study:"Arrays decay to pointers when passed to functions — you LOSE size information. This is WHY std::array exists. C-strings are null-terminated char arrays — every standard function (strlen, strcpy) has an unsafe variant and a safe bounded variant. memcpy is undefined for overlapping regions — memcove handles overlap correctly. Master these because they appear in EVERY systems/embedded project.",
 tasks:[
  ["Implement","Sort suite on int[]: bubble, selection, insertion, shell — count comparisons for each on same 1000-element random array; verify sorted output"],
  ["Implement","Binary search: iterative AND recursive; handle: empty array, single element, all-same values, target not present, target at boundaries — 8 test cases"],
  ["Write","C-string library from scratch: mystrlen, mystrcpy, mystrcat, mystrcmp, mystrstr, myitoa, myatoi, myreverse — each matching standard behavior exactly"],
  ["Build","2D matrix library: add, subtract, multiply (N³), transpose, 3×3 determinant, formatted print with alignment — test: I*A==A, A*A^T is symmetric"],
  ["Write","String manipulation: reverse in-place, is-palindrome, count-vowels, most-frequent-char, compress-runs ('aaabbc' → 'a3b2c1'), remove-duplicates"]
 ]},
{n:16,title:"Pointers — Complete Mastery",diff:"I",time:"4–5 h",prereqs:[11,15],
 concepts:["Declaration/dereference","Pointer arithmetic","nullptr vs NULL","void* generic","const T*/T* const/const T* const","Pointer to pointer","Function pointers","Aliasing rules"],
 study:"Pointers are addresses. Pointer arithmetic respects the pointed-to type: int* + 1 moves 4 bytes. void* is a typeless pointer for C-compatible APIs. const placement matters critically: const T* is a pointer to immutable data (pointer can change), T* const is an immutable pointer to mutable data. Function pointers enable dispatch tables, callbacks, and plugin systems. The aliasing rules determine when the compiler can assume two pointers don't overlap.",
 tasks:[
  ["Write","Pointer tutorial: 20 operations — size, value, address, arithmetic (+1/-1), array indexing, comparison, null check, dereference, address-of, assignment"],
  ["Implement","memcpy, memmove, memset, memchr, memcmp from scratch — handle all alignment cases; memmove MUST handle overlapping src/dst correctly; test overlap case"],
  ["Build","Generic swap(void*, void*, size_t) like qsort's swap helper; then typed swap<T> template; compare codegen; use in a sort function"],
  ["Write","Function pointer dispatch table: 5 operations (+,-,*,/,%) via function pointer array; invoke by index; typedef the function pointer type for clarity"],
  ["Build","2D array 3 ways: T arr[R][C] stack, T* arr[R] heap rows, T* flat manual indexing — compare sizeof, pointer arithmetic, cache behavior with measurement"]
 ]},
{n:17,title:"References",diff:"B",time:"2–3 h",prereqs:[16],
 concepts:["Lvalue references","const references","Reference semantics","No null reference","No rebinding","Lifetime extension from const ref","Dangling reference"],
 study:"References are aliases: same address, mandatory initialization, no rebinding, NEVER null. They exist purely to make syntax cleaner and prevent null pointer bugs. A const reference to a temporary EXTENDS its lifetime to match the reference's scope — a subtle but important rule. Dangling references are just as fatal as dangling pointers but much harder to detect because they look safe.",
 tasks:[
  ["Write","All 5 reference rules with live code: must initialize at declaration, cannot rebind (show it rebinds the pointee), never null, same address, const ref extends lifetime"],
  ["Implement","Linked list node swap via references; in-place sort via reference parameters; verify no copies made by printing constructor/copy-constructor calls"],
  ["Write","const ref lifetime extension: bind rvalue expression to const T& ; show it survives past the expression boundary; bind to const auto&; explain generated code"],
  ["Build","Matrix row-access via references: T& at(int row, int col); T& operator[](int i) returning row reference; m[0][1]=5.0 syntax works; verify address equality"],
  ["Demonstrate","Choosing ref vs pointer: 6 concrete rules (null possible → pointer, rebinding needed → pointer, mandatory → reference, etc.) each with two code examples"]
 ]},
{n:18,title:"Dynamic Memory — Raw",diff:"I",time:"4–5 h",prereqs:[16,17],
 concepts:["new/delete","new[]/delete[]","Heap layout","Memory leaks","Dangling pointers","Double free","Use-after-free","Valgrind/ASan/LeakSanitizer"],
 study:"The heap gives explicit control over object lifetime. Every new must be paired with delete; every new[] with delete[]. The four deadly errors: leak (forget delete), dangling (delete then use), double-free (delete twice), use-after-free (use after delete). AddressSanitizer catches ALL four at runtime. Mismatching new[] with delete (not delete[]) is undefined behavior — the destructor count is stored before the array.",
 tasks:[
  ["Build","Dynamic array class: allocate, fill, grow (2x realloc pattern), shrink, free; test with 10M elements; run under Valgrind to confirm zero leaks"],
  ["Implement","Singly linked list with raw new/delete: push_front, push_back, insert_after, pop_front, find, remove, print_all, free_all; test reverse-order insertion"],
  ["Demonstrate","ALL four memory errors one at a time: leak, dangling-pointer access, double-free, use-after-free — run EACH under ASan and read/understand the full error report"],
  ["Build","Binary search tree: insert, search, inorder/preorder/postorder traversal, height, count, delete-node (all 3 cases), free_tree; test with 1000 random inserts"],
  ["Write","Custom new/delete via operator overloading: log allocation with size, address, file, line using __FILE__/__LINE__; detect matching delete; catch mismatches"]
 ]}
]},

{id:"p2",label:"Phase 2 — User-Defined Types & OOP",
 col:"#3ecf8e",bg:"#071a12",txt:"#5ae8a8",tag:"OOP",
 milestone:{title:"Milestone: 2D Physics Engine",desc:"Build a working 2D physics engine using all OOP principles.",items:["Vec2/Vec3 with full operator set","Shape hierarchy: Circle, Box, Polygon","AABB + SAT collision detection","RigidBody with velocity/force/impulse","PhysicsWorld step with constraint solving"]},
 items:[
{n:19,title:"Structs & Classes — Fundamentals",diff:"B",time:"3–4 h",prereqs:[16,17],
 concepts:["struct vs class (access only)","Member variables","Member functions","this pointer","Public/protected/private","Encapsulation","Class invariants","Method chaining"],
 study:"A class is a value type with invariants — conditions that must ALWAYS be true for a valid object. A BankAccount with balance<0 violates its invariant. Encapsulation enforces invariants by making state private. The this pointer is an implicit first argument to every non-static member function. Method chaining (builder pattern) returns *this — this is how std::ostream's << chains work.",
 tasks:[
  ["Build","Point2D, Rectangle, Circle, Triangle: private fields; explicit constructor validation; area(), perimeter(), contains(Point2D), toString(); test 20 edge cases"],
  ["Write","this pointer: method chaining builder Pattern (Person().name('Alice').age(30).build()); self-comparison in operator==; disambiguation when param shadows member"],
  ["Demonstrate","struct vs class: write identical code both ways; the ONLY difference is default access (struct=public, class=private); verify with is_aggregate"],
  ["Build","Student class: name, ID, grades vector; GPA computation with edge cases; letter grade; rank among peers; formatted PDF-style report card"],
  ["Build","Date class: validate in constructor (no Feb 30!); addDays(n); subtractDays(n); daysBetween(other); isLeapYear(); dayOfWeek(); print formatted ('Monday, March 15, 2026')"]
 ]},
{n:20,title:"Constructors & Destructors",diff:"I",time:"4–5 h",prereqs:[18,19],
 concepts:["Default/parameterized/delegating/copy constructor","explicit keyword","Member initializer list","Init order","RAII pattern","Destructor","Object lifetime trace"],
 study:"RAII (Resource Acquisition Is Initialization) is the MOST IMPORTANT C++ idiom: acquire a resource in constructor, release in destructor. Since destructors ALWAYS run (even when exceptions are thrown), RAII guarantees no resource leaks. The member initializer list initializes in DECLARATION ORDER — not the order you write the list. This catches you every time until it's second nature.",
 tasks:[
  ["Instrument","Print in every ctor/dtor variant; trace exact sequence through: local object, heap object, array, temporary, NRVO return, function argument — explain each"],
  ["Write","ALL constructor types in one class: default, parameterized, delegating (call another ctor), copy (deep-copies heap) — write a trace that shows which fires for each scenario"],
  ["Implement","String class: ctor from const char* (heap alloc); dtor (frees heap); copy ctor (deep copy); copy assign (deep copy + self-assign check); test with 10 scenarios"],
  ["Show","Init list ORDER trap: declare members as b, a; init list says a(1), b(a+1); show b gets GARBAGE because b initialized before a; fix; write tool to detect this"],
  ["Write","explicit constructors: prevent MyMeter x = 5.0 implicit; show compile error; also show EXPLICIT conversion is allowed; explain when explicit is wrong (e.g., string from char*)"]
 ]},
{n:21,title:"Operator Overloading",diff:"I",time:"4–5 h",prereqs:[19,20],
 concepts:["Member vs free function operators","Symmetric operators as friends","Stream operators <<","Subscript/call operator","Increment/decrement","Conversion operators","Spaceship operator <=>"],
 study:"Symmetric operators (+, ==, <) should be FREE functions so BOTH sides can participate in implicit conversion. Stream operators MUST be free (lhs is ostream). The spaceship operator <=> (C++20) generates ALL 6 comparison operators from one implementation. Hidden friend idiom: define free operator inside class body using friend — it participates in ADL but isn't found by regular lookup.",
 tasks:[
  ["Build","Vec2D: +,-,*(scalar),/(scalar),dot(),cross(),length(),normalize(),==,!=,+=,-=,unary-,<<,>> — ALL correct; test: v+(v*-1)==zero; dot perpendicular==0"],
  ["Build","Matrix<T,R,C>: +,*,-,==,!=,()(row,col),[](row),scalar*,<<; static_assert dimension mismatch at compile time; test identity matrix multiplication"],
  ["Build","BigInteger: arbitrary precision arithmetic; +,-,*,==,<,>,<=,>=,<<,>>; test: Fibonacci(200), (2^64)² — verify against Python's int"],
  ["Implement","Iterator class: ++prefix, postfix++, --, *, ->, ==, != — works with range-for, std::sort, std::copy; test with custom container"],
  ["Write","Conversion operators: to double, to string, to bool (for if(obj)); show when implicit conversion causes silent bugs; add explicit to prevent; document the rule"]
 ]},
{n:22,title:"Rule of 3 / 5 / 0",diff:"I",time:"4–5 h",prereqs:[20,21],
 concepts:["Copy constructor","Copy assignment","Destructor","Move constructor","Move assignment","=delete","=default","Self-assignment check","noexcept on move ops"],
 study:"Rule of 3: if you write ANY of {dtor, copy-ctor, copy-assign}, write ALL three — they all manage the same resource. Rule of 5: add move operations for efficiency. Rule of 0: use smart pointers and std::vector so the compiler generates CORRECT Rule of 5 for free — prefer this in production code. noexcept on move operations is critical: std::vector uses move ONLY if noexcept — otherwise it falls back to copy for exception safety.",
 tasks:[
  ["Implement","Buffer<T> (owns heap array): Rule of 3 with copy counter; instrument all 3; run 10 scenarios and verify exact firing order"],
  ["Add","Move ctor + move assign to Buffer; add move counter; prove moves are O(1) vs O(n) copies; show std::vector uses move when noexcept; verify with benchmark"],
  ["Write","Rule of 0: replace raw pointer member with unique_ptr; verify compiler-generated Rule of 5 is correct; run all 10 scenarios from Rule of 3; all should pass"],
  ["Demonstrate","=delete on non-copyable socket class; =default on explicit copy; show each in compiler errors; design guideline: when each is right"],
  ["Benchmark","Copy vs move for Buffer of 100MB data: 10,000 ops each; show moves are constant-time; prove 1000x speedup; inspect assembly to confirm move is just pointer swap"]

{n:26,title:"std::vector — Complete Mastery",diff:"I",time:"4–5 h",prereqs:[22,25],

{n:29,title:"std::string, string_view & Formatting",diff:"I",time:"3–4 h",prereqs:[15,26],

{n:31,title:"Smart Pointers — Complete Mastery",diff:"I",time:"4–5 h",prereqs:[20,22,23],

{n:32,title:"Function Objects, Lambdas & std::function",diff:"I",time:"3–4 h",prereqs:[14,31],

{n:33,title:"Allocators & PMR",diff:"E",time:"5–6 h",prereqs:[18,31],

{n:40,title:"Value Categories",diff:"I",time:"3–4 h",prereqs:[17,22],
 concepts:["lvalue (identity, addressable)","prvalue (temporary, no identity)","xvalue (expiring)","glvalue/rvalue taxonomy","decltype value category","std::move is a cast","Reference collapsing"],
 study:"Every C++ expression has a value category. lvalues have identity (you can take &x). prvalues are pure temporaries (T{}). xvalues are lvalues being moved from (expiring — created by std::move). std::move is NOT a move — it's a cast to T&& that enables move construction/assignment. The ACTUAL move happens in the called constructor. Reference collapsing: & always wins over && (& & → &, & && → &, && & → &, && && → &&).",
 tasks:[

{n:41,title:"Move Semantics — Deep Mastery",diff:"I",time:"4–5 h",prereqs:[22,40],

 study:"After moving, the source must be in a VALID but UNSPECIFIED state — destructible and assignable, but no guarantees beyond that. noexcept on move is critical: std::vector reallocation ONLY uses move if noexcept — otherwise it falls back to copy for exception safety. Check: a 100MB Buffer with throwing move will be COPIED on every vector reallocation! NRVO (Named Return Value Optimization) eliminates the move ENTIRELY for named local returns.",

{n:42,title:"Perfect Forwarding & Universal References",diff:"I",time:"4–5 h",prereqs:[37,41],
 concepts:["Forwarding references (T&&)","Reference collapsing (4 rules)","std::forward","Perfect forwarding factories","Forwarding through variadic templates","Emplace patterns","Move-only types"],
 study:"T&& in a TEMPLATE context is NOT an rvalue reference — it's a forwarding reference that deduces to T& for lvalues and T&& for rvalues. std::forward<T> preserves the original value category. This is HOW emplace_back constructs in-place: it forwards all arguments to the constructor with zero extra copies. Without perfect forwarding, every generic wrapper forces an extra copy of lvalues.",

{n:43,title:"std::optional, std::variant & std::any",diff:"I",time:"4–5 h",prereqs:[35,41],

{n:44,title:"Thread Model & jthread",diff:"I",time:"4–5 h",prereqs:[18,31],

 study:"A data race is UNDEFINED BEHAVIOR in C++ — not just 'possibly wrong result'. The compiler and hardware can produce ANY outcome. ThreadSanitizer detects data races at runtime. jthread (C++20) automatically joins on destruction (preventing terminate()) and supports cooperative cancellation via stop_token. thread_local gives each thread its own copy — critical for per-thread error state and caches.",

{n:45,title:"Mutexes & Synchronization",diff:"I",time:"4–5 h",prereqs:[44],
 concepts:["mutex/recursive_mutex/timed_mutex","shared_mutex","lock_guard/unique_lock/scoped_lock","Deadlock patterns","Lock ordering","std::lock","condition_variable","Spurious wakeup"],
 study:"RAII lock guards are MANDATORY — never acquire a mutex without one. Deadlock happens when thread A holds mutex 1 and waits for 2 while thread B holds 2 and waits for 1. std::scoped_lock acquires multiple mutexes atomically using deadlock-avoidance. ALWAYS use the predicate form of condition_variable::wait to handle spurious wakeups (the OS can wake a thread without notify being called).",

  ["Implement","Thread-safe blocking queue<T>: push adds and notifies; pop blocks on predicate-form wait; try_pop with timeout; test with 4 producers + 4 consumers; verify ordering"],

  ["Demonstrate","Deadlock: two threads acquiring locks in reverse order; run; deadlock; detect with GDB 'thread apply all bt'; fix with std::scoped_lock acquiring BOTH atomically"],
  ["Build","Semaphore (pre-C++20) from mutex + condvar + counter: acquire(), release(), try_acquire(); correct spurious-wakeup handling; then compare to C++20 std::counting_semaphore"],
  ["Write","Pipeline with back-pressure: 3-stage pipeline with bounded queues (size 100); producer blocks when buffer full; measure throughput and latency under load"]
 ]},
{n:46,title:"Atomics & C++ Memory Model",diff:"E",time:"6–7 h",prereqs:[8,45],
 concepts:["atomic<T>","memory_order_relaxed/acquire/release/acq_rel/seq_cst","Happens-before","Synchronizes-with","memory_fence","CAS (compare_exchange_weak/strong)","ABA problem","Spinlock"],
 study:"The C++ memory model defines when stores by one thread are visible to another. seq_cst is safest but adds full memory barriers. acquire/release pairs synchronize: store(release) synchronizes-with load(acquire) of the SAME atomic. relaxed has NO ordering — valid ONLY for statistics counters. ABA problem: a CAS from A→B→A appears unchanged — pack a version counter in high bits. On x86, acquire/release are FREE (TSO model) — only seq_cst costs a fence.",
 tasks:[
  ["Write","Memory model litmus tests: demonstrate why relaxed load/store is wrong for producer-consumer signaling; fix with acquire/release; fix seqlock; explain each memory_order"],
  ["Implement","Spinlock: atomic_flag::test_and_set(acquire) to lock; store(false,release) to unlock; exponential backoff; measure fairness and throughput under contention"],
  ["Build","Lock-free stack with CAS: push/pop using compare_exchange_weak loop; handle ABA by packing 16-bit version in high bits of pointer; verify TSan clean on 8 threads"],
  ["Write","Seqlock: writer bumps to odd version; readers retry if version is odd or changes between two reads; benchmark vs shared_mutex on read-heavy workload"],
  ["Implement","Epoch-based memory reclamation: grace period tracking; safe deferred free of nodes; no ABA; no leaks; TSan clean; test with lock-free list under concurrent modify/delete"]
 ]},
{n:47,title:"Futures, Promises & Coroutines",diff:"E",time:"6–7 h",prereqs:[45,46],
 concepts:["future/promise/packaged_task","std::async (launch::async vs deferred)","shared_future","Coroutine frame","co_await/co_yield/co_return","promise_type protocol","Generator<T>","Task<T>","Symmetric transfer"],
 study:"std::async without launch policy may be LAZY (deferred) — ALWAYS specify launch::async. Coroutines (C++20) suspend and resume — the coroutine frame lives on the HEAP between suspensions. Generator<T> uses co_yield for lazy sequences (process a file without loading it all). Task<T> uses co_await for async pipelines without callback hell. Symmetric transfer enables stack-efficient coroutine chaining.",
 tasks:[
  ["Build","Parallel merge sort: async per-split until depth limit; join futures; handle exceptions across threads; benchmark vs std::sort on 10M elements; show speedup"],
  ["Write","Promise exception transport: set_exception(eptr); future.get() rethrows; chain with shared_future broadcasting result to 8 waiting threads; verify all get correct result"],
  ["Build","Thread pool v2: packaged_task based; submit<F>(f, args...) returns typed future<result>; task graph (future depending on future); proper shutdown handling"],
  ["Implement","Generator<T>: co_yield lazy sequence; range-for compatible; Fibonacci generator; file-line-by-line generator; prime generator — all lazy, zero-overhead vs hand-coded"],
  ["Build","Coroutine event loop: Task<T> awaitable; symmetric transfer (no stack growth); I/O event integration; handle 10,000 concurrent tasks in one thread; compare to thread-per-task"]
 ]},
{n:48,title:"Lock-Free Data Structures",diff:"R",time:"8–10 h",prereqs:[46,47],
 concepts:["MPSC/MPMC queues","Michael-Scott queue","Hazard pointers","Epoch GC","Lock-free ring buffer","ABA prevention","CDSChecker","DWCAS"],
 study:"Lock-free code is notoriously hard to get right. The Michael-Scott queue is the canonical lock-free FIFO — study every memory_order choice in the paper. Hazard pointers announce which nodes a thread is currently reading — preventing early free. Epoch-based reclamation waits for all threads to advance an epoch before freeing. Verify EVERYTHING with ThreadSanitizer — it's the only way to be confident.",

  ["Implement","Lock-free MPSC queue: single consumer reads head atomically; multiple producers CAS tail; benchmark vs mutex queue on 8 threads; verify TSan clean"],
  ["Build","Lock-free ring buffer: power-of-2 size; separate atomic head/tail; producer/consumer modulo; no ABA (sequence numbers); benchmark throughput: target >100M ops/sec"],
  ["Implement","Hazard pointer scheme: per-thread hazard list (2 per thread); retire when hazard-free; verify with custom allocator that freed nodes never have live hazards"],
  ["Write","Michael-Scott MPMC queue: COMPLETE implementation; document EVERY memory_order with the happens-before justification; pass TSan with 16 threads; measure throughput"],
  ["Build","Lock-free sharded hash map: per-bucket CAS for insert/erase; resize with migration; linearizable get/put/remove; TSan clean; benchmark vs mutex map at 8/16/32 threads"]
 ]}
]},

{n:50,title:"ELF, Object Files & Debug Info",diff:"I",time:"4–5 h",prereqs:[49],
 concepts:["ELF header","Program/section headers",".text/.data/.bss/.rodata sections","Symbol table","DWARF debug info","nm/objdump/readelf","Weak symbols","Section attributes"],
 study:"ELF (Executable and Linkable Format) is the standard binary format on Linux. Every symbol in an object file is either defined or an undefined reference to be resolved by the linker. DWARF maps machine instructions back to source lines — GDB reads this for step-debugging. Weak symbols allow optional definitions — the linker picks one if multiple exist. Understanding ELF lets you debug crashes from core dumps on production machines.",

{n:51,title:"Linker Internals & Symbol Resolution",diff:"E",time:"5–6 h",prereqs:[50],
 concepts:["Symbol resolution algorithm","Two-pass linking","Static vs dynamic linking","PLT/GOT mechanism","RPATH/RUNPATH","dlopen/dlsym","Symbol versioning","ODR violations","LTO"],
 study:"The linker resolves symbols: first collect all defined symbols, then resolve all undefined references. Static linking copies code into binary. Dynamic linking uses PLT/GOT: every external call goes through a pointer — roughly 2 extra indirections. Symbol versioning allows shipping v2 while keeping v1 ABI for old clients. ODR violations (same symbol defined differently in two TUs) are UB — LTO helps detect them.",

{n:52,title:"ABI, Calling Conventions & Name Mangling",diff:"E",time:"4–5 h",prereqs:[50,51],

{n:53,title:"CMake — Complete Mastery",diff:"I",time:"4–5 h",prereqs:[9,51],

{n:54,title:"Testing, Debugging & Python Interoperability",diff:"I",time:"5–6 h",prereqs:[53],

{id:"p8",label:"Phase 8 — Memory Allocator Engineering",

 items:[
{n:55,title:"Arena & Bump Allocator",diff:"I",time:"4–5 h",prereqs:[18,33],
 concepts:["Bump pointer","Alignment (power-of-2)","Block chaining","O(1) bulk free","Scoped arena","Per-frame allocation","Grow-only semantics"],
 study:"Arena allocation is the FASTEST possible allocator: increment a pointer by requested size. Free is O(1) — reset the pointer (free everything at once). Used everywhere: per-frame game allocators, per-request web server allocators (parse and respond, then reset), compiler temporaries. The tradeoff: you can't free INDIVIDUAL objects. Scoped arenas enable nested regions — inner scope frees its portion, outer scope unaffected.",
 tasks:[
  ["Implement","Arena: bump-pointer allocate; align to any power-of-2 at request time; reset() frees everything; never moves existing allocations; verify with tracking allocator"],
  ["Build","Block-chaining arena: new block linked when current is full; unlimited total capacity; all pointers to existing data remain valid after growth; test with 1M allocations"],
  ["Write","Scoped arena with RAII: nested ScopedArena objects; inner arena resets when scope exits (but outer is unchanged); verify with 4 nesting levels and allocation tracking"],
  ["Build","Per-frame game allocator: reset every 16ms frame; 10M frame-temp allocations of 8–256 bytes; measure throughput vs malloc; verify reset in <1μs"],
  ["Measure","Arena vs malloc vs tcmalloc: 10M allocations of random sizes 8–512 bytes; measure throughput, peak RSS, fragmentation; plot all three on same graph with error bars"]
 ]},
{n:56,title:"Pool & Slab Allocator",diff:"I",time:"4–5 h",prereqs:[55],
 concepts:["Free-list recycling","Fixed-size pools","Thread-local cache (magazine)","Slab coloring","SLAB vs SLUB","Multi-size slab","Object reuse semantics"],
 study:"Pool allocators pre-allocate same-size objects. Free returns to the free list — O(1) alloc AND free. The magazine layer adds a thread-local cache: each thread has a private 'magazine' (small array of free objects) and only locks the shared slab when the magazine is empty. This eliminates per-allocation locking — used by tcmalloc's thread cache. Slab coloring offsets objects within each slab to avoid cache aliasing.",
 tasks:[
  ["Implement","PoolAllocator<T,N>: N objects pre-allocated in one block; free-list recycling with embedded next pointer; O(1) alloc and free GUARANTEED; test with 1M alloc/free cycles"],
  ["Build","Multi-size slab: pools for 8/16/32/64/128/256/512-byte objects; fall back to arena for larger; track hit rate per size class; benchmark vs malloc for each size class"],
  ["Add","Thread-local magazine cache: per-thread array of 8 free objects; lock only to refill from shared slab; benchmark with 8 threads: show 10x throughput improvement vs mutex-per-alloc"],
  ["Measure","Pool vs malloc for linked-list node churn: 10M alloc/free cycles alternating; compare cache miss rates with perf stat cache-misses; show pool locality advantage"],
  ["Implement","Slab coloring: offset objects by (slab_index * cache_line_size) % page_size within each slab; measure L2 conflict miss reduction with performance counters"]
 ]},
{n:57,title:"Buddy System & General-Purpose Allocator",diff:"E",time:"5–6 h",prereqs:[55,56],
 concepts:["Buddy system","Power-of-2 splitting","Coalescing on free","Segregated free lists","Fragmentation analysis","malloc replacement","jemalloc/tcmalloc comparison"],
 study:"The buddy system splits blocks recursively: request 40 bytes → allocate 64-byte block. On free, if the BUDDY block is also free, coalesce into a 128-byte block. This gives O(log n) alloc/free with BOUNDED fragmentation (at most 2x overhead per allocation). Real allocators combine buddies with size classes and per-thread caches. Building your own malloc teaches you more about C++ than any other single project.",
 tasks:[
  ["Implement","Buddy allocator: round up to power-of-2; split parent block; buddy calculation via XOR; coalesce buddies on free; O(log N); test with random sizes 8–1MB"],
  ["Build","Segregated free lists: 32 size classes from 8 to 4096 bytes; buddy system for larger; direct mmap for huge (>4MB); measure internal+external fragmentation ratio"],
  ["Write","malloc/free replacement: mmap as backing store; -Wl,-wrap,malloc,-wrap,free,-wrap,calloc,-wrap,realloc; ALL existing tests pass; verify with Valgrind"],
  ["Benchmark","Your allocator vs ptmalloc2 vs jemalloc vs tcmalloc: throughput (allocs/sec), peak RSS, fragmentation (peak/live ratio), latency p99; use mimalloc-bench workloads"],
  ["Implement","ASan-friendly allocator: 8-byte poisoned redzones around each allocation; check on free for overflow; detect use-after-free with shadow memory; integrate with ASan report format"]
 ]},
{n:58,title:"Virtual Memory & mmap",diff:"E",time:"5–6 h",prereqs:[57],
 concepts:["Virtual address space layout","mmap/munmap/mprotect/madvise","MAP_ANONYMOUS","Huge pages (THP/MAP_HUGETLB)","Demand paging","Copy-on-write","Guard pages","Overcommit"],
 study:"mmap is the system call behind malloc: it requests pages from the kernel. Demand paging: the kernel allocates PHYSICAL pages only when first touched (page fault). Copy-on-write: after fork(), parent and child share pages READ-ONLY; a write triggers a page fault and the kernel copies just that one 4KB page. Huge pages (2MB vs 4KB) reduce TLB misses 512x — critical for large allocation workloads.",
 tasks:[
  ["Implement","mmap file I/O: map 1GB file for random read access; compare latency vs fseek/fread; measure minor vs major page faults with perf stat page-faults; explain the difference"],
  ["Build","Circular ring buffer with double-mmap trick: mmap same file/shmem twice adjacently; pointer wraps transparently; zero-copy wraparound; test with 1M variable-size messages"],
  ["Write","Guard pages: mprotect(PROT_NONE) on allocation boundaries; SIGSEGV handler that decodes fault address; detect buffer overflow; print allocation metadata; continue or abort"],
  ["Measure","Huge pages benefit: mmap 1GB with MAP_HUGETLB (2MB pages); compare TLB misses vs 4KB pages using perf stat iTLB-misses dTLB-misses; quantify latency difference"],
  ["Implement","CoW fork demo: allocate 1GB; fork(); measure page faults as child writes; count copied pages with /proc/pid/status; compare to pre-fault all pages before fork"]
 ]}
]},

{id:"p9",label:"Phase 9 — OS & Systems Programming",

 milestone:{title:"Milestone: Mini Shell with Job Control",desc:"Build a fully functional POSIX shell.",items:["fork/exec command execution","Pipes | and I/O redirection < > >>","Job control (Ctrl-Z, bg, fg, jobs)","Signal handling (SIGCHLD, SIGTSTP, SIGINT, SIGPIPE)","Glob expansion and environment variables"]},
 items:[
{n:59,title:"Linux Process Model",diff:"I",time:"4–5 h",prereqs:[18,54],
 concepts:["fork()/exec family","waitpid/wait","exit/exit_group","Zombie/orphan processes","Process groups/sessions","POSIX signals overview","Double-fork daemon","capabilities"],
 study:"fork() creates a copy of the process; exec() REPLACES it with a new program. waitpid() reaps children and prevents zombies (defunct processes consuming PID table slots). Process groups support job control — the shell creates a new process group for each pipeline. The double-fork daemon pattern detaches completely from the terminal by becoming a session leader with no controlling terminal.",
 tasks:[
  ["Build","Minimal shell: fork/execvp for commands; pipes with dup2 (preserve original fds); I/O redirection (<,>,>>); background jobs with &; job control SIGTSTP/SIGCONT; built-ins: cd, exit, jobs"],
  ["Write","Process tree: spawn N workers with fork; parent collects ALL with waitpid(-1,WNOHANG) in SIGCHLD handler; guarantee zero zombies; print tree at any point with /proc"],
  ["Implement","POSIX daemon: double-fork (1st fork → setsid → 2nd fork); close all fds; chdir('/'); redirect stdin/stdout/stderr to /dev/null; write PID file; test detachment with ps"],
  ["Build","Resource limits: setrlimit for CPU time (RLIMIT_CPU), virtual memory (RLIMIT_AS), open files (RLIMIT_NOFILE); test each limit fires correctly; handle SIGXCPU gracefully"],
  ["Write","Privilege drop: bind port 443 as root (CAP_NET_BIND_SERVICE); drop capabilities with cap_set_proc; drop to nobody with setuid/setgid; verify with id and /proc/self/status"]
 ]},
{n:60,title:"Signals & Async Events",diff:"I",time:"4–5 h",prereqs:[59],
 concepts:["Signal delivery model","sigaction vs signal()","Signal masks (sigprocmask)","SA_RESTART","Async-signal-safe functions","Self-pipe trick","signalfd","SIGINFO/SIGUSR1"],
 study:"Signal handlers run ASYNCHRONOUSLY in the middle of ANY code — only async-signal-safe functions (write(), _exit(), sem_post()) are safe to call. The self-pipe trick converts signals into file descriptor events safe for event loops. signalfd() is the modern Linux alternative — signals become readable fd events. SA_RESTART automatically restarts interrupted system calls.",
 tasks:[
  ["Write","SIGSEGV handler: print all registers (via siginfo_t + ucontext_t); print stack trace with backtrace_symbols(); write to stderr safely; re-raise to generate core dump"],
  ["Implement","Graceful SIGTERM: handler sets atomic<bool> stop_requested; main loop checks with memory_order_acquire; drains work queue; releases all resources; exits cleanly in <1 second"],
  ["Build","Self-pipe trick: signal handler writes 1 byte to pipe write-end; epoll loop polls pipe read-end alongside sockets; unifies ALL async events into one event loop; test SIGTERM+SIGINT"],
  ["Write","signalfd: receive SIGTERM/SIGINT/SIGHUP as epoll events; read signalfd_siginfo; dispatch; mask signals globally first with pthread_sigmask; integrate cleanly with io_uring loop"],
  ["Implement","SIGALRM periodic timer: 100Hz timer via setitimer; per-period statistics collection without threads; measure jitter histogram; compare vs timer_create(SIGEV_THREAD) jitter"]
 ]},
{n:61,title:"File I/O, epoll & io_uring",diff:"E",time:"6–7 h",prereqs:[60],
 concepts:["Blocking vs non-blocking I/O","epoll_create1/ctl/wait","Level vs edge triggered","io_uring (SQ/CQ rings)","sendfile/splice (zero-copy)","O_DIRECT (bypass page cache)","inotify","vectored I/O"],
 study:"epoll scales to millions of connections — poll/select don't (O(n) scan). Edge-triggered (EPOLLET) requires reading until EAGAIN; level-triggered retriggers while data available. io_uring bypasses syscall overhead using shared ring buffers: submit via SQ ring, harvest completions from CQ ring — zero syscalls for batched I/O. On io_uring, 1M IOPS is achievable from a single thread.",
 tasks:[
  ["Build","epoll event loop: EPOLLET edge-triggered; accept 10,000 concurrent TCP connections; non-blocking state machine (read all until EAGAIN); measure connections/second and latency"],
  ["Implement","io_uring batch reader: ring_size=256; submit 64 read operations; harvest completions; verify results; measure syscall count reduction vs equivalent pread() calls with strace"],
  ["Build","Zero-copy file server: sendfile() for file→socket; splice() for pipe→socket; measure throughput vs read()+write(); demonstrate kernel-only data movement with perf"],
  ["Write","O_DIRECT I/O: page-aligned buffer (posix_memalign); bypass page cache; measure read latency vs cached I/O; when to use: streaming large files, databases with own cache"],
  ["Implement","inotify directory watcher: monitor IN_CREATE/IN_MODIFY/IN_DELETE/IN_MOVED_FROM/IN_MOVED_TO events; integrate into epoll loop; handle event coalescing and overflow"]
 ]},
{n:62,title:"Networking & Sockets",diff:"I",time:"5–6 h",prereqs:[61],
 concepts:["TCP/UDP/Unix sockets","bind/listen/accept","SO_REUSEPORT","Non-blocking connect","TLS with OpenSSL","TCP_NODELAY","SO_KEEPALIVE","Connection pooling"],
 study:"SO_REUSEPORT allows multiple processes to accept connections on the SAME port — kernel load-balances between them (no thundering herd). Non-blocking connect requires epoll to detect completion via EPOLLOUT. TLS adds a handshake phase — OpenSSL's SSL_read may need SSL_write's fd to be readable. TCP_NODELAY disables Nagle's algorithm — critical for latency-sensitive RPC.",
 tasks:[
  ["Build","HTTP/1.1 server: parse request line + headers; chunked transfer encoding; keep-alive with timeout; pipelined requests; handle 10 concurrent clients; measure req/sec with wrk"],
  ["Implement","Non-blocking epoll server: EPOLLET state machine; 50,000 concurrent clients; correct edge-triggered handling (read ALL data on edge); measure latency under load"],
  ["Build","UDP reliable protocol: sequence numbers; cumulative ACK; sliding window (size=16); retransmit timer with exponential backoff; test over localhost with 10% simulated loss"],
  ["Write","UNIX domain socket echo server: accept, echo, close; compare round-trip latency vs TCP loopback with 1000 pings; show 3–5x improvement; explain why"],
  ["Build","TLS server with OpenSSL: BIO-based; accept; SSL_accept handshake; SSL_read; SSL_write; graceful shutdown (SSL_shutdown); verify with openssl s_client; test certificate validation"]
 ]},
{n:63,title:"IPC & Shared Memory",diff:"E",time:"5–6 h",prereqs:[61,62],
 concepts:["Anonymous/named pipes","FIFO","POSIX shared memory (shm_open)","futex (fast userspace mutex)","POSIX message queues","Unix sockets + SCM_RIGHTS","Shared memory ring buffer"],
 study:"futex is the PRIMITIVE underlying pthread_mutex: in the uncontended case it never enters the kernel — just an atomic compare-and-swap in userspace. A shared memory ring buffer achieves near-memory-bandwidth IPC with NO kernel involvement per message. SCM_RIGHTS lets you send open file descriptors between processes over a Unix socket — used for privilege separation and resource sharing.",
 tasks:[
  ["Build","Shared memory ring buffer: shm_open + mmap in two processes; futex wait/wake for synchronization; zero-copy message passing; benchmark vs pipe (should be 10x faster)"],
  ["Implement","POSIX message queue: mq_open; mq_send with priorities; mq_receive; mq_notify for async delivery; measure latency; compare to pipe/socket IPC"],
  ["Write","SCM_RIGHTS: server opens a file; sends open fd to client over UNIX socket; client reads from received fd WITHOUT knowing the path; test with a file only root can read"],
  ["Build","Lock-free SHM queue: two C++ processes; atomic head/tail in shared memory; memory ordering for cross-process atomics (mmap MAP_SHARED); benchmark vs all other IPC methods"],
  ["Implement","Distributed counter: 8 processes increment shared memory atomic counter; final count must equal exactly 8*N iterations; no race; measure throughput; compare to single-process"]
 ]}
]},
