{id:"p10",label:"Phase 10 — Performance Engineering",
 col:"#3B8811",bg:"#080f04",txt:"#70c030",tag:"Perf",
 milestone:{title:"Milestone: Fastest CSV Parser",desc:"Build the fastest possible CSV parser in pure C++.",items:["SIMD-accelerated field scanning (32 bytes/cycle)","SWAR fallback for non-AVX targets","Cache-blocked row processing","Zero-allocation string_view output","Benchmark: achieve >2 GB/s on modern hardware"]},
 items:[
{n:64,title:"Profiling & Benchmarking",diff:"I",time:"4–5 h",prereqs:[7,8,54],
 concepts:["perf record/stat/top/annotate","Flamegraphs (Brendan Gregg)","Callgrind (exact instruction count)","Heaptrack","Google Benchmark","RDTSC","Amdahl's law","Benchmarking pitfalls"],
 study:"You cannot optimize what you cannot measure — this is the MOST IMPORTANT rule in performance engineering. perf record samples at 1000 Hz and profiles ENTIRE stack traces. Flamegraphs show call chains width-proportional to time — the widest towers are your bottlenecks. Google Benchmark handles warmup, CPU frequency scaling, variance, and statistical analysis. ALWAYS profile before optimizing — your intuition is wrong 80% of the time.",
 tasks:[
  ["Profile","Real application with perf record -g; generate flamegraph.pl + flamegraph; identify top 3 hotspots; optimize each; re-profile; show before/after comparison; document speedup"],
  ["Use","Callgrind + cg_annotate: find cache misses in matrix multiply; annotate source lines with miss counts; identify exact struct fields causing misses; fix layout; verify improvement"],
  ["Use","Heaptrack: find top allocation site; trace full call chain; show allocation count and peak heap; redesign to eliminate it; measure RSS reduction"],
  ["Build","Google Benchmark suite: measure median/stddev/p99/throughput; separate setup from measured work; use DoNotOptimize(); counter for items/second; compare 5 variants of same algorithm"],
  ["Write","RDTSC micro-benchmark: measure single-instruction latency (load, add, multiply, divide, sqrt); account for OoO execution with memory fence barriers; document measured latencies"]
 ]},
{n:65,title:"Compiler Optimizations & PGO",diff:"I",time:"4–5 h",prereqs:[50,64],
 concepts:["Inlining heuristics","Loop unrolling","Auto-vectorization reports","PGO (profile-guided optimization)","LTO (cross-TU optimization)","Devirtualization","Alias analysis","Anti-patterns"],
 study:"PGO (Profile-Guided Optimization) uses RUNTIME profiles to guide decisions: which branches to predict, which functions to inline, how to arrange code for cache. LTO (Link-Time Optimization) enables inlining ACROSS translation unit boundaries — often 5–15% improvement. Aliasing prevents vectorization: two pointers that MIGHT alias cannot be vectorized. __restrict__ tells the compiler they don't alias.",
 tasks:[
  ["Enable","Auto-vectorization: -O3 -march=native -fopt-info-vec-optimized; read report; identify what BLOCKS vectorization in each function; fix aliasing, loop bounds, alignment — get green checkmarks"],
  ["Apply","PGO pipeline: instrument build (-fprofile-generate) → run representative workload → optimized build (-fprofile-use); measure gain on your benchmark; compare hot-path assembly"],
  ["Apply","LTO: -flto on all TUs; verify cross-TU inlining in Godbolt; measure binary size change; measure performance gain; understand why template-heavy code benefits most"],
  ["Use","Godbolt Compiler Explorer: paste 5 functions; compare GCC vs Clang vs MSVC output; identify each compiler's unique optimizations; understand which is 'most correct' for your use"],
  ["Write","Anti-patterns blocking optimization: virtual in hot loop (devirt), aliased pointers (restrict fix), missing noexcept on move (vector), signed loop counter (overflow UB) — fix all; show assembly proof"]
 ]},
{n:66,title:"SIMD Programming",diff:"E",time:"6–7 h",prereqs:[4,65],
 concepts:["SSE2/AVX2/AVX-512 instruction sets","Intel intrinsics naming (_mm256_...)","Vector lane operations","Horizontal reductions","Gather/scatter","Alignment (32-byte)","SIMD string processing","llvm-mca"],
 study:"SIMD operates on multiple data simultaneously: AVX2 processes 8 floats or 32 bytes per instruction. The intrinsics naming: _mm256 (256-bit), _epi8 (8-bit integer lanes), _ps (packed float). Non-power-of-2 sizes need masking for tail elements. Use llvm-mca to analyze throughput and port pressure WITHOUT running the code — it gives you theoretical cycles from assembly.",
 tasks:[
  ["Implement","AVX2 horizontal sum: load 8 floats, _mm256_hadd_ps twice + vperm2f128 reduction; benchmark vs scalar loop; verify result; show llvm-mca port analysis"],
  ["Build","SIMD byte search: _mm256_cmpeq_epi8 to find a target byte in 32 positions simultaneously; handle unaligned start/end; benchmark vs strchr and memchr; target: 10x speedup"],
  ["Implement","SIMD 4×4 matrix multiply: all 16 floats in YMM registers; fused multiply-add (FMA); measure achieved FLOP/s vs theoretical peak; analyze with Intel Advisor or llvm-mca"],
  ["Write","SIMD prefix scan: parallel prefix sum using log2(N) depth shuffle+add operations; verify for all N sizes; benchmark vs serial scan; useful for parallel partitioning"],
  ["Build","SIMD JSON field scanner: scan for ':', ',', '{', '}', '\"' simultaneously with _mm256_cmpeq_epi8 + OR; process 32 bytes/cycle; benchmark vs simdjson and naive byte-at-a-time"]
 ]},
{n:67,title:"Cache-Friendly Data Structures & NUMA-Aware Design",diff:"E",time:"6–7 h",prereqs:[8,65,66],
 concepts:["AoS vs SoA","Data-oriented design","Cache-oblivious algorithms","Hot/cold field splitting","Intrusive containers","Packed swap-remove","NUMA-aware allocation","First-touch policy"],
 study:"SoA (Structure of Arrays): processing one field of 1M particles — SoA gives sequential memory access (SIMD-vectorizable); AoS scatters fields across cache lines. Cache-oblivious algorithms have NO explicit tile size but are automatically cache-efficient at EVERY level via recursive divide-and-conquer (Hilbert curve order). NUMA awareness: allocate memory on the NUMA node that will process it — violating this gives 2–3x worse bandwidth.",
 tasks:[
  ["Build","AoS vs SoA: 1M particle system with position, velocity, mass, color; process ONLY velocity; show SoA gives 4–8x speedup; analyze cache miss counts with perf stat; SIMD the SoA version"],
  ["Implement","Cache-oblivious matrix multiply: recursive Hilbert-curve tile order; measure L3 miss reduction vs naive and blocked; show it's AUTOMATICALLY optimal at every cache level"],
  ["Write","Hot/cold field split: entity struct with 5 hot fields (accessed every frame) and 10 cold fields (accessed rarely); move cold to separate array; benchmark entity processing loop"],
  ["Build","Intrusive doubly-linked list: ListNode embedded in T; no separate allocation; compare cache behavior to std::list with perf stat; show 2–3x fewer cache misses for traversal"],
  ["Implement","NUMA-aware parallel sort: pin threads to NUMA nodes with pthread_setaffinity_np; allocate thread-local data with mbind; benchmark vs default allocation; measure bandwidth"]
 ]}
]},

{id:"p11",label:"Phase 11 — Compiler Internals",
 col:"#c07820",bg:"#160e00",txt:"#e0a040",tag:"Compiler",
 milestone:{title:"Milestone: Tiny C Compiler Front-End",desc:"Build a complete compiler front-end for a subset of C.",items:["Lexer: tokenize all C operators, keywords, literals","Recursive-descent parser → AST","AST pretty-printer (reproduce valid C from AST)","Semantic analysis: type checking + scope resolution","Code generator: x86-64 assembly for expressions + functions"]},
 items:[
{n:68,title:"Lexer & Tokenization",diff:"E",time:"6–7 h",prereqs:[14,37],
 concepts:["Token types","Maximal munch rule","DFA","Hand-written vs regex lexers","Lookahead","String interning","Source location tracking","Error recovery"],
 study:"A lexer converts a character stream into a token stream. The maximal munch rule: always take the LONGEST valid token (++ not +,+). Implement as a switch-based manual scanner — faster than regex and easier to debug. Track source location (file, line, column) in every token — good error messages require this. String interning stores each identifier ONCE and compares by pointer — essential for O(1) symbol comparison.",
 tasks:[
  ["Implement","C lexer: tokenize keywords (int, if, while, for, return, void, struct), operators (all C operators), integer/float/string/char literals, identifiers, comments — handles ALL C syntax"],
  ["Write","Token printer: dump every token with type, lexeme, source location (file:line:col); test on 10 real C programs; verify zero tokenization errors"],
  ["Add","Error recovery: on bad character, skip to next semicolon/newline; collect ALL errors in one pass; report file:line:col for each; never abort on first error"],
  ["Implement","String interning: hash all identifiers into a global table; token.name is a pointer into the table; two identical identifiers compare with == (pointer equality); measure speedup"],
  ["Test","Lex all .c files from a small open-source project (e.g., tcc or minilisp); verify zero errors; measure throughput (tokens/second); compare to flex-based lexer"]
 ]},
{n:69,title:"Parser & AST",diff:"E",time:"8–10 h",prereqs:[68],
 concepts:["Context-free grammar","Recursive descent parsing","Pratt parsing (precedence climbing)","AST node types","Visitor pattern","FIRST/FOLLOW sets","Error recovery","Source-location tracking"],
 study:"Recursive descent is the most READABLE parsing approach: one function per grammar rule. Pratt parsing handles operator precedence elegantly via binding powers — it's how most production parsers work. The AST (Abstract Syntax Tree) removes redundant syntax. Visitors enable multiple passes (type check, optimize, codegen) without modifying the AST. Track source locations in EVERY node for error messages.",
 tasks:[
  ["Implement","Recursive descent for statements: if, while, for, do-while, return, break, continue, block; produces AST nodes; handles nested statements to arbitrary depth"],
  ["Add","Pratt expression parser: correct precedence for all C operators (assignment right-assoc, comparison left-assoc, etc.); unary vs binary minus; function call vs subscript"],
  ["Build","AST node hierarchy: Expr (BinOp, UnaryOp, Call, Subscript, Cast, Literal, Var, Member), Stmt (If, While, For, Return, Block, Decl, Expr), Decl (VarDecl, FuncDecl, StructDecl)"],
  ["Implement","AST pretty-printer: reproduce valid C from AST; roundtrip test: parse→print→parse→compare AST structure; must handle all 50+ test programs"],
  ["Add","Parser error recovery: detect 25 common C syntax errors; report ALL before aborting; show file:line:col; suggest fix; continue parsing to find more errors"]
 ]},
{n:70,title:"Semantic Analysis & IR",diff:"E",time:"8–10 h",prereqs:[69],
 concepts:["Scoped symbol table","Type system (int, float, pointer, array, struct, function)","Type checking","Implicit conversions","SSA form","Three-address code","Control flow graph","Dominators"],
 study:"Semantic analysis catches errors the parser can't: undeclared variables, type mismatches, wrong argument counts, returning void from int function. The scoped symbol table maps names to types through nested scopes. SSA form (Static Single Assignment) makes every variable assigned EXACTLY once — the foundation of modern optimizations. The CFG (Control Flow Graph) models all execution paths.",
 tasks:[
  ["Implement","Scoped symbol table: stack of hash maps; push on '{'; pop on '}'; resolve names through scope chain; detect redeclaration in same scope; detect use-before-declaration"],
  ["Build","Type checker: detect int+char* (pointer arithmetic OK), void* incompatibility, wrong argument count, missing return in non-void function, unused variables — 20 distinct error types"],
  ["Implement","Three-address code (TAC) IR: lower AST to TAC with temp variables; print as readable pseudo-assembly; handle all expressions and control flow statements"],
  ["Build","CFG construction: identify basic blocks (instructions between leaders/terminators); add edges for branches; compute predecessors/successors; detect unreachable blocks"],
  ["Implement","Constant folding on TAC: fold 2+3→5, 0*x→0, 1*x→x, x+0→x at IR level; verify with 10 test programs; show before/after TAC dump; measure code size reduction"]
 ]},
{n:71,title:"Code Generation",diff:"E",time:"8–10 h",prereqs:[70],
 concepts:["Register allocation","Stack frame layout","Instruction selection","Calling convention in codegen","Function prologue/epilogue","Jump patching","Peephole optimization"],
 study:"Code generation translates IR to machine instructions. Stack-based allocation: put every temporary on the stack — simple but slow. Register allocation (graph coloring) maps temporaries to registers for performance. Function prologue: push rbp; mov rbp,rsp; sub rsp,N. Epilogue: leave; ret. Jump patching: emit jumps with placeholder targets, patch when you know the true target address.",
 tasks:[
  ["Implement","Stack-based code gen: every TAC temporary allocated on stack; generate valid x86-64 NASM assembly; assemble with NASM; link with gcc; run correctly"],
  ["Build","Function codegen: prologue (push rbp; mov rbp,rsp; sub rsp,N for locals); epilogue (leave; ret); save/restore callee-saved registers; correct ABI for calls"],
  ["Implement","Expression codegen: arithmetic (+,-,*,/,%), comparison (==,!=,<,<=,>,>=), logical (&&,||,!), bitwise; generate correct assembly for EVERY C operator"],
  ["Add","Linear scan register allocator: allocate top 6 registers (rax-r9); spill to stack when none free; re-use freed registers; show assembly improvement vs all-stack"],
  ["Test","Compile 15 C test programs (fibonacci, quicksort, linked list, matrix multiply); run each; verify output matches gcc -O0; fix every discrepancy; achievement unlocked: you built a compiler"]
 ]}
]},

{id:"p12",label:"Phase 12 — Security & Exploitation",
 col:"#d04030",bg:"#120404",txt:"#e87060",tag:"Security",
 milestone:{title:"Milestone: Security Audit Toolkit",desc:"Analyze and harden a real codebase.",items:["Stack canary implementation","Buffer overflow CVE analysis (OpenSSL/zlib)","ROP chain construction (educational, CTF only)","libFuzzer campaign finding a real CVE class","Hardened build: PIE+RELRO+canary+NX verified with checksec"]},
 items:[
{n:72,title:"Memory Exploitation & Stack Attacks",diff:"E",time:"6–7 h",prereqs:[16,18,51],
 concepts:["Stack layout (saved RIP, RBP, locals)","Buffer overflow mechanics","Stack canaries","NX bit","ASLR","Return-to-libc","Shellcode (conceptual)"],
 study:"Stack buffer overflows overwrite the saved return address, hijacking control flow. Modern mitigations layer: stack canaries (detect overwrites), NX (prevent executing injected code), ASLR (randomize addresses). Understanding these attacks is essential for writing safer code, auditing dependencies, and passing security reviews. This section is EDUCATIONAL — the goal is defense, not offense.",
 tasks:[
  ["Demonstrate","Stack layout in GDB: write a function; set breakpoint; 'x/20xg $rsp' to show frame; identify saved RBP, saved RIP, local variables, function arguments in stack"],
  ["Show","Buffer overflow: deliberately overflow char[16]; show saved RIP overwrite with pattern; calculate exact offset; control crash address; explain why this is dangerous"],
  ["Implement","Stack canary: place random value (from /dev/urandom) before saved RBP; verify on function return; abort with meaningful message on mismatch (like -fstack-protector-all)"],
  ["Demonstrate","ASLR effect: run same binary 10 times; show different stack/heap/library base addresses each time; show how it defeats static return-to-libc without a leak"],
  ["Analyze","A known CVE (e.g., CVE in zlib or libpng); read the NVD disclosure; reproduce the vulnerability in a test harness; understand the fix; explain both root cause and defense"]
 ]},
{n:73,title:"ROP, Heap Attacks & Modern Mitigations",diff:"R",time:"8–10 h",prereqs:[72],
 concepts:["Return-Oriented Programming","ROP gadgets","ROP chain construction","Use-after-free exploitation","CFI (Control Flow Integrity)","RELRO","PIE","Spectre/Meltdown overview"],
 study:"ROP bypasses NX by chaining existing code SNIPPETS (gadgets) ending in 'ret'. Each gadget does 1–2 operations. CFI (Control-Flow Integrity) restricts which targets are valid for indirect calls — deployed in Chrome, Android, Windows. Understanding these attacks motivates WHY CFI, RELRO, and PIE exist in modern systems. RELRO makes the GOT read-only after init — preventing GOT overwrite attacks.",
 tasks:[
  ["Demonstrate","ROP gadget search: use ROPgadget tool on a binary; find 'pop rdi; ret', 'pop rsi; ret', 'pop rdx; ret' gadgets; explain why these are useful for setting up syscall args"],
  ["Build","Simple ROP chain: chain 3 gadgets to call puts(addr) to leak libc address; explain how NX is bypassed without injecting any code; test in a CTF-style binary (no ASLR)"],
  ["Implement","Use-after-free demo: allocate, free, reallocate same size, read via old pointer; show type confusion; catch with ASan; explain heap groom technique for exploitation"],
  ["Write","CFI enforcement: build with -fsanitize=cfi and LTO; instrument indirect calls; demonstrate invalid call target is caught; measure overhead; explain why LTO is required"],
  ["Build","Hardened binary: PIE + full RELRO + stack canary + NX + FORTIFY_SOURCE=2 + shadow stack (CET if supported); verify each mitigation with checksec tool; document the defense-in-depth"]
 ]},
{n:74,title:"Secure Coding & Fuzzing",diff:"I",time:"5–6 h",prereqs:[72,73],
 concepts:["Input validation","Integer overflow defense","Format string vulnerabilities","Injection attacks","Constant-time comparison","libFuzzer + ASan","Structured fuzzing","Security checklist"],
 study:"Secure coding is writing code that remains CORRECT under malicious input. Integer overflow in size calculations leads to heap overflow — always check before allocation. Format string bugs (printf(user_input)) can read arbitrary stack memory. Constant-time comparison prevents timing side-channel attacks on secrets. libFuzzer+ASan finds memory safety bugs AUTOMATICALLY — run it on every parser you write.",
 tasks:[
  ["Write","Input validation library: bounds checking all user inputs; integer overflow guards before multiplications; null termination enforcement; length limits; sanitize for SQL/shell injection"],
  ["Demonstrate","Format string vulnerability: printf(user_input) with '%x.%x.%x.%x.%x.%x'; show stack values leaking; fix with printf('%s', user_input); explain why it's dangerous"],
  ["Implement","Constant-time memcmp: compare two byte buffers with no early exit; verify with timing measurements that it's actually constant-time; use for secret comparison"],
  ["Build","libFuzzer + ASan campaign: target your Phase 3 string utilities and CSV parser; run 1 hour with 8 threads; find and fix ALL findings; document each bug class discovered"],
  ["Write","Security checklist: 25 C++ security pitfalls with before/after fix examples: buffer overflow, integer overflow, format string, use-after-free, race condition, TOCTOU, etc."]
 ]}
]},

 items:[
{n:75,title:"Bare Metal & Bootloader",diff:"E",time:"8–10 h",prereqs:[5,6,51],
 concepts:["BIOS boot sequence","Real mode (16-bit)","A20 gate","GDT","Protected mode (32-bit)","Long mode (64-bit)","NASM","UEFI boot","IDT setup"],
 study:"x86 boots at 0x7C00 in 16-bit real mode. Transitioning to 64-bit requires: 1) enable A20 gate, 2) set up GDT with 64-bit descriptors, 3) enter protected mode, 4) set up 4-level page tables, 5) set EFER.LME, 6) jump to 64-bit code. Every step must be EXACTLY right — one mistake and the machine triple-faults silently. UEFI is the modern alternative: boots directly to 64-bit mode with memory map already provided.",
 tasks:[
  ["Write","Stage 1 MBR bootloader (512 bytes exactly): load stage 2 from disk sectors via BIOS INT 13h in LBA mode; error handling; verify magic bytes 0x55AA"],
  ["Write","Stage 2: enable A20 gate (BIOS, keyboard controller, fast A20 methods); build GDT with null/code/data descriptors; enter 32-bit protected mode; print 'PM!' to VGA text buffer"],
  ["Write","Long mode transition from 32-bit: PML4+PDPT+PD page tables (identity map first 2GB); EFER.LME=1; CR4.PAE=1; CR3=PML4; CS reload via far jump; jump to C++ kernel_main()"],
  ["Build","IDT: handlers for all 32 CPU exceptions (0-31); print register dump (all 16 regs) + stack trace on exception; APIC EOI; test by triggering divide-by-zero intentionally"],
  ["Write","UEFI bootloader with gnu-efi: GetMemoryMap; parse loaded kernel ELF; ExitBootServices; SetVirtualAddressMap; disable UEFI runtime; jump to kernel entry with memory map arg"]
 ]},
{n:76,title:"Physical & Virtual Memory Manager",diff:"E",time:"8–10 h",prereqs:[58,75],
 concepts:["Page frame allocator","E820 memory map","Bitmap/buddy PFA","4-level page tables (PML4→PDPT→PD→PT)","Higher-half kernel","Demand paging","Copy-on-write","mmap syscall","ASLR"],
 study:"Physical memory management: scan the E820 memory map, build a bitmap allocator. Virtual memory: build a 4-level page table walker. Map the kernel to the higher half (0xFFFFFFFF80000000) — keeps lower virtual memory for userspace. Page fault handler enables demand paging: map page on first access instead of mapping everything upfront. Copy-on-write is how fork() is O(1) instead of O(address-space-size).",
 tasks:[
  ["Implement","Physical page frame allocator: scan E820 map; bitmap tracking (1 bit per 4KB page); mark all reserved/firmware regions; alloc_page() O(n)/free_page() O(1); test with 1000 alloc/free cycles"],
  ["Build","4-level page table walker: PML4→PDPT→PD→PT; map_page(virt, phys, flags); unmap_page(virt); translate_virt(virt)→phys; map kernel to 0xFFFFFFFF80000000; identity map first 2GB"],
  ["Implement","Page fault handler: on #PF, check if address in valid VMA; allocate physical page; update page table; IRET to retry; test with stack growth (map new stack pages on demand)"],
  ["Write","mmap syscall: MAP_ANONYMOUS (zero-filled on demand), MAP_SHARED (shared between processes), MAP_PRIVATE (CoW); munmap; mprotect; test from userspace"],
  ["Implement","ASLR: use RDRAND to randomize: kernel slide (16MB granularity), stack base, heap base, mmap base; different on every boot; maintain /proc/self/maps equivalent"]
 ]},
{n:77,title:"Interrupts, APIC & Timers",diff:"E",time:"6–8 h",prereqs:[75,76],
 concepts:["8259 PIC (legacy)","Local APIC","I/O APIC","ACPI MADT parsing","APIC timer calibration","TSC-deadline mode","HPET","Interrupt routing","MSI/MSI-X"],
 study:"The Local APIC manages interrupts for one CPU core. The I/O APIC routes external interrupts (keyboard, NIC, timer) to specific CPU cores. ACPI MADT parsing tells you where all APICs are. The APIC timer delivers interrupts to one core at programmed intervals — calibrate it against TSC or HPET for microsecond precision. TSC-deadline mode programs the next interrupt as an absolute TSC value — no drift.",
 tasks:[
  ["Write","Remap 8259 PIC: move IRQ0–15 from vectors 8–15 to vectors 32–47 (avoid CPU exception conflicts); mask all IRQs; only enable what you need; test by triggering IRQ0 timer"],
  ["Enable","Local APIC: read IA32_APIC_BASE MSR; MMIO map LAPIC registers; enable via SPURIOUS_VECTOR register (bit 8); send EOI; calibrate LAPIC timer against PIT (10ms reference)"],
  ["Implement","APIC timer: one-shot mode for preemption; periodic mode for heartbeat; TSC-deadline mode (write IA32_TSC_DEADLINE MSR); fire interrupt after N cycles; measure jitter"],
  ["Write","I/O APIC: parse ACPI MADT for IOAPIC address and OVERRIDE entries; MMIO read/write IOREGSEL+IOWIN; program redirect table entry for PS/2 keyboard (IRQ1→vector 33)"],
  ["Build","HPET driver: parse ACPI HPET table; MMIO map; enable main counter; configure comparator 0 for one-shot; implement nanosecond-accurate kernel_sleep_ns() using HPET"]
 ]},
{n:78,title:"Scheduler, Syscalls & Userspace",diff:"E",time:"10–12 h",prereqs:[46,77],
 concepts:["Context switch (assembly)","Task control block","Round-robin","CFS virtual runtime","SMP","SYSCALL/SYSRET","VFS layer","ramfs","ELF64 loader","Minimal libc"],
 study:"Context switching saves all callee-saved registers and switches RSP. CFS (Completely Fair Scheduler) tracks virtual runtime (execution time × weight) in a red-black tree — lowest virtual runtime runs next. SMP: each CPU has its own runqueue; work-stealing balances load. SYSCALL/SYSRET is the fast syscall mechanism: uses MSR registers, no stack switch in kernel — much faster than INT 80.",
 tasks:[
  ["Implement","Context switch in NASM: save RBX,RBP,R12-R15 (callee-saved) + RSP; restore new task's state; jump via stored RIP; test with 3 tasks printing alternating to serial port"],
  ["Build","Round-robin scheduler: APIC timer fires every 5ms; save context; pick next task from runqueue; restore context; test with N=8 tasks; verify fairness (equal CPU time per task)"],
  ["Implement","CFS-style scheduler: virtual runtime (nsec × weight); red-black tree runqueue; extract minimum for next task; SMP: per-CPU runqueue; idle steal from other CPUs"],
  ["Implement","SYSCALL entry: set IA32_LSTAR MSR to handler; save all user-mode registers; dispatch by rax; implement: read, write, open, close, mmap, munmap, brk, exit, getpid"],
  ["Build","ELF64 loader: mmap() PT_LOAD segments with correct permissions; set up initial stack with argc/argv/envp/auxv (PHDR, ENTRY, PAGESZ); jump to entry; run 'Hello, World!' user binary"]
 ]}
]},

{id:"p14",label:"Phase 14 — Distributed Systems",

 items:[
{n:79,title:"Distributed Systems Fundamentals",diff:"E",time:"5–6 h",prereqs:[46,62],
 concepts:["CAP theorem","Consistency models","FLP impossibility","Lamport clocks","Vector clocks","Happens-before in distributed","Failure modes (crash, Byzantine)","Two-phase commit"],
 study:"CAP theorem: you can't simultaneously guarantee Consistency, Availability, AND Partition tolerance. FLP impossibility: NO deterministic async algorithm can reach consensus with even ONE crash failure. This is WHY Raft uses random timeouts — it's probabilistic, not deterministic. Lamport clocks give a partial order of events. Vector clocks track causality across all nodes.",
 tasks:[
  ["Write","Lamport clock simulation: 5 processes; message passing; demonstrate total ordering of all events; show why Lamport clocks don't capture causality (concurrent events)"],
  ["Build","Vector clock simulation: 3 processes; show causality tracking; demonstrate concurrent events have incomparable timestamps; implement merge() and compare()"],
  ["Implement","Two-phase commit: coordinator + 3 participants; demonstrate BLOCKING failure scenario (coordinator crashes after PREPARE, before COMMIT); show why 3PC helps"],
  ["Write","Eventual consistency demo: two replicas accepting concurrent writes; implement Last-Writer-Wins via Lamport timestamp; sync replicas; verify convergence; measure staleness"],
  ["Read","'Paxos Made Simple' (Lamport 2001); implement single-decree Paxos with 3 nodes using gRPC; test with node failures; understand why Multi-Paxos is needed for a log"]
 ]},
{n:80,title:"Raft Consensus Algorithm",diff:"R",time:"10–12 h",prereqs:[46,62,79],
 concepts:["Leader election","Log replication","Commit index","Match/nextIndex per follower","Log compaction (snapshots)","Membership changes","Safety proof","Liveness conditions"],
 study:"Raft is designed to be UNDERSTANDABLE. The 3 subproblems: leader election (random timeouts + majority votes), log replication (leader sends AppendEntries, majority must persist), safety (committed entries NEVER lost). An entry is committed when a MAJORITY has it. Study the safety proof — it's not just liveness that matters, it's the invariant that committed entries are never rolled back.",
 tasks:[
  ["Implement","Raft leader election: randomized timeout [150,300ms]; RequestVote RPC; vote granting rules (lastLogTerm/Index check); re-election on timeout; test 5-node cluster convergence"],
  ["Build","Raft log replication: AppendEntries RPC; leader tracks nextIndex[]/matchIndex[] per follower; advance commitIndex when majority have entry; apply to state machine in order"],
  ["Implement","Log compaction: snapshot when log exceeds 1000 entries; InstallSnapshot RPC for lagging followers; restore from snapshot on startup; test snapshot+restore correctness"],
  ["Build","Full 5-node Raft cluster: start; elect leader; replicate 100,000 Put operations; kill leader; verify new leader elected in <500ms; verify all committed entries available"],
  ["Test","Chaos testing: random kill/restart of any node; network partition (split brain); verify: no committed entry is ever lost; eventual consistency; recovery in <2s; document failures found"]
 ]},
{n:81,title:"gRPC & Protocol Buffers",diff:"I",time:"5–6 h",prereqs:[62,79],
 concepts:["Protocol Buffers (proto3)","Serialization performance","Service definition","Unary/server-streaming/client-streaming/bidirectional","Interceptors","Deadlines+cancellation","Load balancing","Health checks"],
 study:"Protocol Buffers are 3–10x more compact than JSON and 5–100x faster to parse because they're binary with no field name strings. gRPC generates type-safe client/server stubs from .proto definitions. Deadlines PROPAGATE across service boundaries — a 100ms deadline set by the client is enforced through the entire RPC chain. Server-streaming RPCs handle large results efficiently without loading everything in memory.",
 tasks:[
  ["Define","proto3 service: KeyValueStore with Get(unary), Put(unary), Delete(unary), Watch(server-stream), BatchPut(client-stream); compile to C++ with grpc_cpp_plugin"],
  ["Implement","gRPC async server: CompletionQueue-based; handle concurrent RPCs; thread pool executor; proper error status codes (NOT_FOUND, ALREADY_EXISTS, DEADLINE_EXCEEDED)"],
  ["Build","gRPC client with deadline propagation: set 100ms deadline; propagate to downstream calls; retry with exponential backoff (1s,2s,4s,8s) on UNAVAILABLE; circuit breaker pattern"],
  ["Add","Interceptors: logging (req/resp/duration), auth token injection (metadata), metrics (Prometheus counters for each method), rate limiting (token bucket per client)"],
  ["Test","Load test with ghz: 10,000 concurrent RPCs; measure p50/p99/p999 latency; find bottleneck with perf; optimize — target: p99 < 5ms for simple KV operations"]
 ]},
{n:82,title:"Observability & Distributed Tracing",diff:"I",time:"4–5 h",prereqs:[80,81],
 concepts:["Structured logging (JSON)","Trace ID propagation","OpenTelemetry spans","Metrics (counters/gauges/histograms)","Prometheus + Grafana","Log aggregation preview","SLO/SLI/SLA"],
 study:"In a distributed system, a single request touches multiple services. Trace IDs propagate across ALL service boundaries — every log line includes the trace ID for correlation. OpenTelemetry is the standard for traces, metrics, and logs. SLOs (Service Level Objectives) define 'what good looks like' — e.g., 99.9% of requests complete in < 10ms. Burn rate alerts warn you when you're consuming your error budget too fast.",
 tasks:[
  ["Build","Structured logger: JSON output with: timestamp (RFC3339), level, trace_id (W3C trace context), span_id, service_name, message, key-value fields; stdout + file sink"],
  ["Implement","Trace context propagation: generate trace_id+span_id at entry; inject into gRPC metadata (traceparent header); extract in server; log all events with correct IDs; visualize in Jaeger"],
  ["Add","Prometheus metrics to gRPC service: request_total (counter), request_duration_seconds (histogram with 50 buckets), active_connections (gauge); labeled by method and status"],
  ["Build","Distributed tracing: OpenTelemetry SDK; create span for each gRPC call; add events for key steps; set attributes (user_id, shard_id); export to Jaeger; visualize full trace"],
  ["Write","SLO dashboard: 99.9% of requests in <10ms; compute error budget; burn rate over 1h/6h/24h windows; alert rule when burn rate >5x; Grafana dashboard with 5 panels"]
 ]}
]},

{n:83,title:"Advanced Profiling & Roofline Model",diff:"E",time:"6–7 h",prereqs:[64,65,66,67],
 concepts:["Intel VTune / AMD uProf","PEBS (Precise Event-Based Sampling)","LBR (Last Branch Record)","Memory bandwidth saturation","Roofline model","Operational intensity","Bandwidth-bound vs compute-bound"],
 study:"The roofline model classifies a kernel as compute-bound or memory-bandwidth-bound: if your FLOP/s is below the ridge point (bandwidth × arithmetic_intensity), you're bandwidth-bound — adding more compute does nothing. PEBS gives PRECISE sample attribution to exact instructions (not just function-level). LBR records the last 32 branch targets — enough to reconstruct the hot call path without full instrumentation overhead.",
 tasks:[
  ["Build","Roofline measurement: compute peak FLOP/s (using your SIMD benchmark) and peak bandwidth (stream triad); classify 5 different kernels as compute-bound or bandwidth-bound; plot"],
  ["Use","PEBS with perf: record with -e cpu/mem-loads/pp; find exact instruction with most loads; identify struct field causing misses; fix data layout; measure improvement"],
  ["Implement","LBR-based hot-path reconstruction: perf record -e cycles --branch-stack; reconstruct call chain; identify unexpected paths; compare to sampling profiler; show they agree"],
  ["Build","Memory bandwidth benchmark: stream triad (a[i]=b[i]+s*c[i]) with SIMD; measure achieved bandwidth; compare to hardware peak (from lshw or spec sheet); explain gap sources"],
  ["Write","Optimization report: take a real application from baseline; profile → fix hotspot 1 (3x) → fix hotspot 2 (2x) → PGO (1.15x); document each step; final speedup ≥6x"]
 ]},
{n:84,title:"ASIO Networking & Async I/O",diff:"E",time:"6–7 h",prereqs:[61,47,65],
 concepts:["Boost.ASIO / standalone ASIO","io_context executor","Proactor pattern","async_read/write","ASIO coroutines (C++20)","Strand (serialize without mutex)","Timer-based rate limiting","Connection pool"],
 study:"ASIO implements the Proactor pattern: you initiate async operations and get notified on COMPLETION. Strands serialize handler execution for a given object WITHOUT mutexes — the key insight is that strands don't block, they just ensure one handler runs at a time. ASIO coroutines make async code look sequential. io_context running on N threads = N concurrent handlers — safe with strands.",
 tasks:[
  ["Build","Async TCP server: io_context; accept loop; async_read_some + async_write_some; 10,000 concurrent connections; measure throughput and latency; handle partial reads correctly"],
  ["Implement","ASIO C++20 coroutines: co_await async_read; co_await async_write; co_await timer; chain 3 async operations sequentially; compare to callback-based version — readability"],
  ["Build","HTTP/1.1 client pool: async GET with follow-redirects; chunked encoding; keep-alive with idle timeout; pool of 64 connections; pipelining 4 requests; measure requests/second"],
  ["Write","ASIO strand: two handlers from different threads operating on same connection; wrap in strand; verify TSan clean; benchmark strand overhead vs mutex (should be 2–3x less)"],
  ["Build","Rate limiter: token bucket via steady_timer; async_wait for refill; no blocking; burst handling; test with 10,000 requests/sec target; verify actual rate within 1% of target"]
 ]}
]},

{id:"p16",label:"Phase 16 — Design Patterns & Architecture",

{n:85,title:"Creational & Structural Patterns",diff:"I",time:"5–6 h",prereqs:[24,35,43],
 concepts:["Factory Method","Abstract Factory","Builder (fluent API)","Prototype (clone)","Singleton anti-pattern","Adapter","Bridge","Composite","Decorator (stackable)","Facade","Flyweight","Proxy"],
 study:"Patterns are solutions to RECURRING design problems. Factory decouples creation from use. Builder handles complex multi-step construction. Decorator adds behavior without inheritance — and stackable decorators multiply capabilities. Flyweight shares immutable state between many objects. Proxy controls access (lazy loading, caching, protection). Singleton is almost always a mistake: it's a global variable in disguise — use dependency injection instead.",

  ["Implement","Stackable Decorators: Logger + Cache + Retry + CircuitBreaker — all on same IDataSource interface; stack any combination; test: Retry(Cache(Logger(real_source)))"],
  ["Build","Composite: filesystem tree — File and Directory both implement IComponent; recursive size(), count(), find(name), list(pattern); test with deep directory structure"],
  ["Implement","Flyweight: shared immutable glyph data for text renderer; unique_ptr per unique glyph; shared_ptr for sharing; measure memory: 10k chars before/after flyweight; show reduction"]
 ]},
{n:86,title:"Behavioral Patterns & C++ Idioms",diff:"I",time:"5–6 h",prereqs:[85],
 concepts:["Observer (typed EventBus)","Strategy (swappable algorithms)","Command + Undo","State machine","Visitor (exhaustive dispatch)","PIMPL (ABI stability)","NVI (Non-Virtual Interface)","Type erasure","Passkey idiom"],
 study:"PIMPL (Pointer to Implementation) hides ALL implementation details: the header shows only a forward declaration and unique_ptr — changing implementation details doesn't require recompiling users. NVI adds invariant checking AROUND virtual calls (pre/post conditions). Type erasure stores heterogeneous callables without a common base class — this is how std::function works. Passkey idiom: compile-time access control without friendship abuse.",

  ["Implement","State machine: TCP connection (CLOSED→LISTEN→SYN_RCVD→ESTABLISHED→FIN_WAIT→TIME_WAIT→CLOSED); event-driven; log every transition; invalid transitions throw StateError"],
  ["Build","Visitor: AST (Literal,BinOp,IfExpr,WhileExpr,Call) nodes; PrintVisitor, EvalVisitor, TypeCheckVisitor, CodeGenVisitor — all exhaustive; adding new visitor doesn't change AST nodes"],
  ["Implement","PIMPL: ABI-stable library class; hide implementation in .cpp; change implementation without recompiling clients; PIMPL with unique_ptr; measure compile time improvement"]
 ]},
{n:87,title:"Software Architecture at Scale",diff:"E",time:"5–6 h",prereqs:[86,53],
 concepts:["Module boundaries","API design principles","ABI stability","Semantic versioning","Architecture Decision Records (ADRs)","Dependency inversion","Hexagonal architecture","Domain-Driven Design preview"],

  ["Implement","Hexagonal architecture: core KV store domain logic with NO I/O; REST adapter, gRPC adapter, CLI adapter, test adapter — all using the same domain core without modification"],

 ]}

 items:[
{n:88,title:"Memory Model & Formal Reasoning",diff:"R",time:"8–10 h",prereqs:[46,48],
 concepts:["Sequential consistency (SC)","Happens-before","Synchronizes-with","DRF theorem","TSO (Total Store Order x86)","CDSChecker","Weak memory model litmus tests","Formal verification"],
 study:"The DRF theorem: if your program is Data-Race-Free under SC, SC behavior is guaranteed. This justifies writing race-free code using mutexes and assuming SC semantics — you get the simple model for free. TSO (x86's model) allows stores to be buffered — a store isn't visible to other cores until the store buffer drains. CDSChecker exhaustively explores ALL interleavings of a concurrent program up to a bound.",
 tasks:[
  ["Write","Formal proof: Dekker's algorithm fails without fences on TSO; add correct fences; re-prove with TSO model; implement in C++ with exact memory_orders; verify with CDSChecker"],
  ["Implement","Dekker's mutual exclusion in C++ with correct memory_order; verify exhaustively with CDSChecker (all interleavings); pass; document every memory_order choice with justification"],
  ["Write","TSO litmus tests: 'store buffering' (both stores visible before loads on TSO); 'message passing' (requires release/acquire); demonstrate each with real execution on x86"],
  ["Build","Lock-free queue with formal annotations: every memory_order with happens-before proof; prove producer→consumer synchronization; verify with CDSChecker; document the proof"],
  ["Read","Boehm & Adve 'Foundations of the C++ Concurrency Memory Model' (2008); implement all 5 motivating examples from the paper; verify each demonstrates the described behavior"]
 ]},
{n:89,title:"Undefined Behavior — Complete Taxonomy",diff:"E",time:"6–7 h",prereqs:[46,72],
 concepts:["Strict aliasing rule","Signed integer overflow","Null pointer dereference","Lifetime violations","Padding bit UB","Shift UB","Unsequenced modifications","UBSan taxonomy","Compiler UB exploitation"],
 study:"Compilers ACTIVELY exploit UB for optimization. Signed overflow never happens (assumption) → loop counter never wraps → optimize infinite loop away (gcc actually does this). Strict aliasing: the compiler assumes int* and float* never alias → wrong assumption silently corrupts data. UBSan catches 30+ categories at runtime. Writing UB-free code requires KNOWING every category — you can't avoid what you don't know.",
 tasks:[
  ["Write","30 distinct UB examples across ALL categories: signed overflow, strict aliasing, null dereference, lifetime, padding bits, left-shift overflow, unsequenced, etc. — compile with UBSan; show each fires"],
  ["Demonstrate","Strict aliasing exploitation: read float through int*; compile with -O2; show compiler ASSUMES no alias; show the broken optimization in assembly; then fix with memcpy or union"],
  ["Write","Lifetime UB: use-after-move (STL string), use-after-free (heap), dangling reference (returning ref to local), iterator invalidation — each caught by ASan; explain why each is UB"],
  ["Implement","UB-free arithmetic library: every operation checked before execution; correct rounding modes for float; 100% coverage tested; UBSan clean; performance within 5% of unchecked"],
  ["Build","libFuzzer + UBSan campaign: fuzz ALL Phase 1–5 parsers for 2 hours; find and fix EVERY UB class discovered; document each bug with: root cause, exploit scenario, fix, test case"]
 ]},
{n:90,title:"Advanced Templates & Overload Resolution",diff:"R",time:"7–8 h",prereqs:[39,43],
 concepts:["Two-phase lookup","ADL (Argument-Dependent Lookup)","SFINAE","Partial template ordering","Overload resolution 12 tiebreakers","Concept subsumption","Expression SFINAE idioms","Niebloids"],
 study:"Two-phase lookup: non-dependent names are looked up at DEFINITION time (phase 1); dependent names at INSTANTIATION time (phase 2). ADL finds operators in the namespace of their argument types — this is how operator<< for std::cout works. SFINAE removes invalid overloads instead of erroring. Concept subsumption: more constrained wins — this is the CLEAN replacement for SFINAE overloading.",
 tasks:[
  ["Write","Two-phase lookup: 6 examples showing phase 1 vs phase 2 lookup; deliberately cause and then fix errors; explain WHY dependent lookup is deferred; use decltype to probe"],
  ["Demonstrate","Partial ordering: most specialized template wins; 5 examples with step-by-step tiebreaker analysis; write a test that exercises partial ordering across 3 candidate templates"],
  ["Write","12 overload resolution tiebreakers: test case for EACH; reference to [over.match.best] in the standard; show which rule applies; write disambiguation examples for each rule"],
  ["Build","Concept subsumption hierarchy: C3 requires C2 requires C1; verify most-constrained overload always selected; test with 7 different type combinations; explain why subsumption beats SFINAE"],
  ["Write","Expression SFINAE detection idioms: has_begin<T>, has_operator_plus<T,U>, has_value_type<T>, is_awaitable<T>, is_range<T> — all using void_t or decltype trick; test each"]
 ]},
{n:91,title:"Modules, Embedded C++ & Reflection",diff:"E",time:"7–8 h",prereqs:[39,54],
 concepts:["C++20 Modules (named modules, partitions)","Header units","Module interop with legacy headers","Embedded constraints (no heap, no exceptions, no RTTI)","MISRA C++2023","Result<T,E>","Stack analysis","C++26 static reflection preview"],
 study:"Modules eliminate the textual inclusion model — no more header guard races, no macro leakage across TU boundaries, dramatically faster compilation. For embedded/safety-critical C++: no heap (fragmentation, non-determinism), no exceptions (overhead, non-determinism), no RTTI (code size). Result<T,E> propagates errors without exceptions — zero overhead on success path. MISRA C++ rules prevent classes of bugs common in safety-critical code.",
 tasks:[
  ["Write","Named module with 3 partitions: math, string, container; export subset; verify internal linkage stays hidden; benchmark compile time: modules vs headers for 50-file project"],
  ["Build","No-heap embedded program: static arrays only, placement new, pool allocator, no new/malloc; compile with -fno-exceptions -fno-rtti; verify with nm that no heap symbols present"],
  ["Implement","Result<T,E> + PROPAGATE macro: chain 5 error-returning functions without exceptions; zero overhead on success path; monadic and_then/map_error/or_else; test error propagation"],
  ["Write","MISRA C++2023 compliant module: annotate each enabled rule; annotate every required deviation with justification; run cppcheck --misra; achieve zero mandatory violations"],
  ["Build","Manual reflection: REFLECT(Struct, field1, field2, ...) macro; for_each_field at runtime; automatic JSON serializer/deserializer; automatic == operator; test with 5 different structs"]
 ]}

{id:"p18",label:"Phase 18 — Robotics, CV, AI & Production Systems",
 col:"#3ecf8e",bg:"#031008",txt:"#5ae8a8",tag:"Robotics & AI",
 milestone:{title:"Milestone: Autonomous Perception Pipeline",desc:"Run a complete sensor-to-decision perception stack.",items:["ROS2 node: LiDAR → cluster → track → classify","Kalman filter object tracking (EKF)","Camera + LiDAR fusion with calibration","rviz2 real-time 3D visualization","Bag file record + replay + regression test"]},
 items:[
{n:92,title:"ROS2 Architecture & rclcpp",diff:"I",time:"5–6 h",prereqs:[44,54,62],
 concepts:["DDS middleware","Nodes/Topics/Services/Actions","QoS profiles","Lifecycle nodes","Composable nodes","Intra-process zero-copy","Parameters","Custom messages"],
 study:"ROS2 uses DDS (Data Distribution Service) for pub-sub. QoS profiles control reliability (RELIABLE vs BEST_EFFORT), durability (TRANSIENT_LOCAL for late joiners), and deadline (trigger callback if no message in N ms). Lifecycle nodes support managed startup/shutdown — crucial for hardware bring-up. Composable nodes in one process use zero-copy intra-process communication via rclcpp::TypeAdapterT.",
 tasks:[
  ["Build","Pub/sub node: custom .msg type with header+data; QoS RELIABLE+TRANSIENT_LOCAL; test intra-process vs network; measure latency difference; verify late-joiners receive last message"],
  ["Build","Service server/client: custom .srv; async callback; sync call with timeout; handle server crash mid-call; test: 1000 requests, inject 5% failures, verify client handles all"],
  ["Implement","Action server: long-running path planning with step-by-step feedback; handle cancel gracefully; test: start action, wait 50%, cancel, verify clean abort"],
  ["Write","Lifecycle node: configure/activate/deactivate/cleanup state machine; hardware init in configure; error handling per transition; test all 6 transitions including error cases"],
  ["Build","Composable container: 3 nodes in one process; zero-copy IPC for point cloud (large message); benchmark: separate processes vs composable; show latency and CPU reduction"]
 ]},
{n:93,title:"State Estimation & Sensor Fusion",diff:"E",time:"6–7 h",prereqs:[67,92],
 concepts:["Linear Kalman Filter","EKF (Jacobian linearization)","UKF (sigma points)","IMU integration (quaternions)","Sensor fusion","Covariance propagation","Observability","Particle filter"],
 study:"The Kalman filter is the BLUE (Best Linear Unbiased Estimator) for linear Gaussian systems. For nonlinear systems: EKF linearizes via Jacobians (fast but diverges for highly nonlinear); UKF uses deterministic sigma points that capture non-linearities better. IMU integration uses quaternions to avoid gimbal lock. Observability: the Gramian matrix tells you WHICH states you can actually estimate from given measurements.",
 tasks:[
  ["Implement","Linear KF: 1D position+velocity with noisy accelerometer + GPS; tune Q (process noise) and R (measurement noise); plot: true state, noisy measurement, filtered estimate"],
  ["Build","EKF: 6-DOF IMU (3-axis gyro + 3-axis accel) + GPS; quaternion state propagation; GPS position correction step; initialize covariance; handle GPS dropout"],
  ["Implement","UKF: sigma points + unscented transform; compare NEES (Normalized Estimation Error Squared) vs EKF on nonlinear pendulum; show UKF is more accurate"],
  ["Build","Particle filter: 2D robot localization on a known map; 2000 particles; systematic resampling; roughening; handle particle degeneracy; visualize particle cloud in rviz2"],
  ["Write","Observability analysis: compute observability Gramian for your sensor config; identify unobservable states; explain what ADDITIONAL sensor would make them observable"]
 ]},
{n:94,title:"Computer Vision & LiDAR",diff:"E",time:"7–8 h",prereqs:[67,93],
 concepts:["Camera calibration","Feature detection (ORB/FAST)","RANSAC","Optical flow","Stereo vision","LiDAR PCL pipeline","ICP registration","NDT scan matching"],
 study:"The pinhole camera model projects 3D points to 2D via intrinsic matrix K and extrinsic [R|t]. RANSAC robustly estimates geometric models despite 50%+ outliers. LiDAR point clouds need: filtering (voxel grid), ground removal (RANSAC plane), clustering (Euclidean), bounding box extraction. ICP iteratively minimizes point-to-point distance — converges to local minimum, sensitive to initialization.",
 tasks:[
  ["Implement","Camera calibration: detect chessboard corners (cv::findChessboardCorners); calibrateCamera; compute K matrix + distortion coefficients; measure reprojection error < 0.5px"],
  ["Build","Feature pipeline: FAST corners → ORB descriptors → BFMatcher + Lowe ratio test → RANSAC homography; visualize inlier matches; test on 20 image pairs with known ground truth"],
  ["Implement","Visual odometry: Essential matrix from matched points; decompose R,t (4 solutions, disambiguate with cheirality); PnP for scale recovery; integrate pose; compare to GPS ground truth"],
  ["Build","LiDAR PCL pipeline: read PCD → VoxelGrid filter → RANSAC ground plane removal → EuclideanCluster extraction → oriented BoundingBox per cluster; publish to ROS2 for rviz2 visualization"],
  ["Implement","ICP from scratch: KD-tree nearest neighbors; SVD for optimal R,t (Kabsch algorithm); iterate to convergence; test: two rotated point clouds, verify convergence to ground truth transform"]
 ]},
{n:95,title:"SLAM & Path Planning",diff:"E",time:"8–10 h",prereqs:[94],
 concepts:["Pose graph optimization (g2o/GTSAM)","Loop closure detection","3D LiDAR odometry (LOAM-style)","A* on occupancy grid","RRT* in C-space","MPC controller","Pure pursuit"],
 study:"SLAM jointly estimates robot pose AND map. Pose graph optimization corrects drift by finding loop closures — when the robot recognizes a previously-visited place, it adds a constraint and g2o/GTSAM solves for the globally consistent trajectory. A* on occupancy grids finds optimal paths. RRT* asymptotically converges to the optimal path. MPC optimizes over a receding horizon considering dynamics and constraints.",
 tasks:[
  ["Build","2D LiDAR SLAM: NDT scan matching; maintain pose graph; detect loop closure via scan similarity; optimize with g2o; visualize trajectory + map in rviz2; test in Gazebo"],
  ["Implement","3D LiDAR odometry (LOAM-style): extract edge+planar features; match to local feature map; compute pose; accumulate trajectory; test on KITTI dataset"],
  ["Implement","A* on occupancy grid: admissible heuristic (Euclidean); tie-breaking (h*1.001); visited set; diagonal movement; test on 1000×1000 map with 30% obstacles"],
  ["Implement","RRT* in 2D C-space: steer function; near set radius (adaptive); rewire procedure; test convergence to optimal; compare path quality vs RRT without star"],
  ["Build","MPC controller for differential drive robot: linearize model; QP solver; track a reference trajectory; test in Gazebo with 1kHz control loop; achieve <5cm tracking error"]
 ]},
{n:96,title:"CUDA & Deep Learning Inference",diff:"E",time:"8–10 h",prereqs:[65,66,67],
 concepts:["Grid/block/thread hierarchy","Shared memory tiling","CUDA streams","Warp divergence","ONNX format","INT8 quantization","TensorRT","Operator fusion","CUDA graphs"],
 study:"GPU architecture: thousands of threads run in warps of 32 in lockstep. Global memory ~400 cycles; shared memory ~1–3 cycles — use tiling to reuse data. Warp divergence: if threads in a warp take different branches, both branches execute sequentially. CUDA graphs capture the launch overhead once, then replay at near-zero cost — critical for inference where kernel launch overhead dominates.",
 tasks:[
  ["Write","CUDA tiled matrix multiply: shared memory tiles of 32×32; handle non-multiple-of-tile edge case; measure occupancy with nvcc --ptxas-options=-v; achieve >85% theoretical peak FLOP/s"],
  ["Build","Parallel reduction: 100M floats; 6-stage warp-shuffle reduction (_shfl_down_sync); atomic final sum; compare vs CPU; achieve >90% GPU memory bandwidth; document each stage"],
  ["Write","CUDA streams: overlap compute kernel with host-device memcpy; pipeline 8 chunks; measure throughput improvement vs sequential; use CUDA events for precise timing"],
  ["Build","ONNX inference: load ResNet-50; run CPU inference; INT8 per-channel quantization (calibrate on 100 images); build TensorRT engine; benchmark latency vs ONNX Runtime; target <2ms"],
  ["Implement","Fused CUDA kernels: Conv2D+BN+ReLU fused in one kernel (vs 3 separate); measure memory roundtrip elimination; build CUDA graph for inference loop; show launch overhead reduction"]
 ]},
{n:97,title:"Real-Time Systems & ROS2 RT",diff:"E",time:"5–6 h",prereqs:[46,92],
 concepts:["PREEMPT_RT kernel","SCHED_FIFO/SCHED_RR","Priority inversion","Priority inheritance (PTHREAD_PRIO_INHERIT)","mlockall","RT-safe patterns (no malloc)","cyclictest","DDS QoS deadlines"],
 study:"PREEMPT_RT converts spinlocks to sleeping mutexes, making the ENTIRE kernel preemptible. SCHED_FIFO tasks run until they block or yield — use for critical tasks at highest priority. mlockall locks all pages into RAM — prevents latency spikes from page faults on first access. A 1ms control loop needs < 500μs worst-case execution time — measure with cyclictest and a loaded system.",
 tasks:[
  ["Write","RT task: SCHED_FIFO priority 80; mlockall(MCL_CURRENT|MCL_FUTURE); pre-fault stack with alloca; no malloc in loop; run cyclictest simultaneously; measure latency histogram; target p99 < 100μs"],
  ["Demonstrate","Priority inversion: low-priority holds mutex; high-priority blocked; medium-priority runs ahead of high; show in perf timeline; verify high-priority is delayed by low-priority work"],
  ["Fix","Priority inheritance: PTHREAD_PRIO_INHERIT on mutex; rerun priority inversion scenario; show high-priority no longer delayed; measure maximum latency improvement"],
  ["Build","RT-safe ring buffer: wait-free SPSC; no malloc; no blocking; static memory; compile-time checked size; test at 1kHz in SCHED_FIFO task; verify no latency spikes"],
  ["Configure","ROS2 on PREEMPT_RT kernel; FastDDS with SCHED_FIFO; DDS QoS deadline=1ms liveliness; measure end-to-end sensor-to-actuator latency; target: median <500μs, p99 <2ms"]
 ]}
]},

{id:"p19",label:"Phase 19 — Neural Networks, CUDA ML & Advanced AI",
 col:"#a78bfa",bg:"#0c0818",txt:"#c4a8ff",tag:"Deep Learning",
 milestone:{title:"Milestone: End-to-End ML Pipeline in C++",desc:"Train, quantize, and deploy a neural network entirely in C++.",items:["Neural net from scratch (conv/fc/bn/relu) — CUDA","INT8 quantization with calibration dataset","TensorRT engine: <1ms inference on GPU","ONNX export and cross-platform deployment","ROS2 node: camera → inference → detection → control"]},
 items:[
{n:98,title:"Neural Networks from Scratch in C++/CUDA",diff:"E",time:"8–10 h",prereqs:[66,96],
 concepts:["Forward pass","Backpropagation","Tensor Cores (WMMA)","mma.sync","Conv2D/BatchNorm/ReLU/MaxPool/FC","SGD/Adam optimizer","CUDA kernel for each layer"],
 study:"Building a neural net in CUDA reveals why GPUs dominate AI. Modern performance comes entirely from Tensor Cores (accessible via WMMA or mma.sync): these specialized hardware units performing 4x4 or 16x16 matrix multiplies in mixed precision. Writing kernels that utilize shared memory tiling AND Tensor Cores is the peak of AI performance engineering.",
 tasks:[
  ["Implement","Dense (FC) layer: forward (matmul + bias); backward (dW=x^T·dy, db=sum(dy), dx=W^T·dy); test: XOR problem converges in <1000 iterations with SGD; verify gradients with finite differences"],
  ["Build","Tensor Core optimized matmul: Write a CUDA kernel using nvcuda::wmma to perform mixed-precision (FP16/FP32) matrix multiplication; benchmark vs naive global-memory matmul; show >4x speedup"],
  ["Implement","Conv2D layer CUDA: im2col + CUBLAS GEMM; stride, padding, groups; backward pass; test: random init forward pass matches PyTorch output to 1e-4; measure FLOP/s"],
  ["Implement","BatchNorm layer: forward (normalize + scale + shift); backward (gradient through batch statistics); test numerical stability with very small/large inputs; running mean for inference"],
  ["Build","Full CNN: Conv→BN→ReLU→MaxPool→FC; train on MNIST in C++; achieve >98% accuracy; save/load weights; compare training curve to PyTorch reference implementation"],
  ["Implement","Adam optimizer: first and second moment estimation; bias correction; weight decay (AdamW); compare convergence vs SGD on CIFAR-10 feature extractor; plot loss curves"]
 ]},
{n:99,title:"Transformer Architecture & Attention",diff:"R",time:"8–10 h",prereqs:[98],
 concepts:["Self-attention mechanism","Multi-head attention","Positional encoding","Layer normalization","Feed-forward sublayer","KV cache","Flash Attention","Grouped-query attention (GQA)","CUDA kernels for attention"],
 study:"The Transformer's self-attention computes Q=XW_Q, K=XW_K, V=XW_V; attention=softmax(QK^T/√d_k)V. This is O(n²) in sequence length — the bottleneck for long sequences. Flash Attention reformulates the computation to never materialize the full n×n attention matrix — using CUDA shared memory tiling to compute attention in O(n) memory with the same output. KV cache eliminates recomputing keys/values for previous tokens during autoregressive inference.",
 tasks:[
  ["Implement","Single-head self-attention in C++ (CPU): Q/K/V projection, scaled dot-product, softmax, output projection; test: 4 tokens, d_model=8; verify numerically against PyTorch"],
  ["Implement","Multi-head attention CUDA: parallel computation of H heads; concatenate and project; benchmark H=8/16/32 heads on sequence length 128/512/2048; achieve >60% GPU utilization"],
  ["Implement","Flash Attention CUDA kernel: tiled computation avoiding full attention materialization; verify output matches naive attention to 1e-5; measure memory usage (should be O(n) not O(n²))"],
  ["Build","Transformer encoder block: MHA + LayerNorm + FFN (2-layer MLP, GELU activation) + residual connections; load pretrained weights from ONNX; run inference on text tokens"],
  ["Implement","KV cache for autoregressive inference: cache K,V for all previous tokens; generate next token by attending to cache + new token only; measure speedup for 100-token generation"]
 ]},
{n:100,title:"Quantization, Deployment & LLM Internals",diff:"R",time:"7–8 h",prereqs:[96,99],
 concepts:["INT8/Q4_0/Q8_0 quantization","GGML format","vLLM PagedAttention","TensorRT optimization passes","Operator fusion","KV cache optimization","Continuous batching"],
 study:"Quantization (like the GGML Q4_0 format) reduces memory bandwidth 4–8x — critical for running LLMs on consumer hardware. PagedAttention (vLLM style) solves KV-cache fragmentation by managing memory in pages, similar to an OS kernel. Learning how to compress weights and manage large tensor pools is what defines a production AI engineer today.",
 tasks:[
  ["Build","Quantized GEMM Engine: Implement a CPU-based matrix-vector multiplication engine that operates on 4-bit (Q4_0) quantized blocks; utilize AVX2/AVX-512 SIMD instructions; benchmark vs FP32 matmul"],
  ["Build","Paged Memory Allocator: Build an AI-focused 'Arena' pages system for managing KV-cache; handle dynamic growth and page-sharing across requests; verify zero fragmentation"],
  ["Implement","INT8 per-channel quantization: calibration with 256 images; compute per-channel scale/zero-point; quantize weights; compare accuracy vs FP32 on CIFAR-10; target <1% accuracy loss"],
  ["Build","TensorRT optimization pipeline: load ONNX; apply FP16 where safe; INT8 where calibrated; verify output matches FP32 to within 1%; serialize .engine; load and benchmark"],
  ["Implement","Operator fusion: manually fuse Conv+BN+ReLU into one CUDA kernel; compare vs 3 separate kernels; measure memory bandwidth reduction; show latency improvement"],
  ["Build","Batched inference server: accept requests from queue; dynamic batching (max_batch=32, max_wait=5ms); GPU execution; return results; benchmark: throughput vs latency tradeoff"],
  ["Write","Complete deployment benchmark: ResNet-50 inference on 10,000 images; FP32 vs FP16 vs INT8; batch sizes 1/8/32/128; TensorRT vs ONNX Runtime vs raw CUDA; plot latency-throughput Pareto frontier"]
 ]},
]},

{n:103,title:"Capstone: AI/ML Systems",diff:"R",time:"40–80 h",prereqs:[],

{n:104,title:"Capstone: Compilers & Tools",diff:"R",time:"40–80 h",prereqs:[],

{id:"p21",label:"Phase 21 — Advanced Algorithms & Data Structures",
 col:"#26c6da",bg:"#041418",txt:"#50d8e8",tag:"Algorithms",
 milestone:{title:"Milestone: CP Library",desc:"Build a competitive-programming quality algorithm library.",items:["Segment tree with lazy propagation","Persistent segment tree","Suffix array + LCP (SA-IS O(n))","Dinic max-flow","NTT polynomial multiply"]},
 items:[
{n:106,title:"Advanced Trees — Red-Black, AVL, B-tree",diff:"E",time:"6–7 h",prereqs:[27],
 concepts:["Red-black tree invariants","4 insert cases","6 delete cases","AVL rotations","B-tree splits/merges","Treap","Skip list"],
 study:"Red-black trees maintain O(log n) height through color invariants and rotations — study all 4 insert cases and 6 delete cases. AVL trees are more strictly balanced (height diff ≤ 1) — better lookup but worse insertion. B-trees have high branching factor, designed for disk I/O. Treaps (BST + random heap priority) have probabilistic O(log n) with simple split/merge operations.",
 tasks:[
  ["Implement","Red-black tree: insert (all 4 rotation cases), delete (all 6 cases), search, min, max; write invariant validator (RB1: root black, RB2: red has black children, RB3: equal black height); run after EVERY op"],
  ["Implement","AVL tree: insert with height tracking; 4 rotation types (LL, RR, LR, RL); delete with rebalance; verify height invariant after every op; benchmark vs std::set on 10M random inserts"],
  ["Build","B-tree (order t=4): insert with preemptive split on the way down; search; delete with merge/redistribute; test 1M keys; verify all B-tree properties with validator"],
  ["Implement","Treap: BST by key + heap by random priority; split(key)→{left,right}; merge(L,R)→treap; insert/delete via split+merge; test same 1M keys; compare to RB-tree speed"],
  ["Build","Skip list: probabilistic multi-level linked list; O(log n) expected insert/search/delete; parameterized max level; test 1M ops; verify same results as std::set"]
 ]},
{n:107,title:"Segment Tree & Fenwick Tree",diff:"E",time:"5–6 h",prereqs:[106],
 concepts:["Segment tree (point update, range query)","Lazy propagation","Persistent segment tree","Fenwick tree (BIT)","2D Fenwick tree","Merge sort tree","Offline vs online queries"],
 study:"Segment trees answer range queries in O(log n) and support point/range updates. Lazy propagation defers updates to children — critical for range-assign or range-add queries. Persistent segment trees keep ALL historical versions by path copying — O(n log n) memory for n updates. Fenwick trees (Binary Indexed Trees) have simpler code for prefix sums in O(log n).",
 tasks:[
  ["Implement","Segment tree: range sum query + point update; range min query + range update (lazy propagation for range-add); test: 10^6 random ops; verify vs brute force"],
  ["Implement","Lazy propagation for range-assign: assign value v to range [l,r]; query range sum/min/max; ensure lazy is pushed down lazily; test correctness with 100k ops"],
  ["Build","Persistent segment tree: copy-on-path creates new version; query any historical version; test: k-th smallest in range using persistent seg tree on sorted order; verify vs brute force"],
  ["Implement","Fenwick tree (BIT): prefix sum in O(log n); point update; range sum via prefix; 2D Fenwick for 2D prefix sum; test 10^6 ops; compare to segment tree speed"],
  ["Build","Merge sort tree: segment tree where each node stores SORTED array of elements in that range; answer k-th smallest in range [l,r] in O(log^2 n); test 10^5 queries"]
 ]},
{n:108,title:"Graph Algorithms — Network Flow & Matching",diff:"E",time:"6–7 h",prereqs:[107],
 concepts:["Dinic's max-flow O(V^2 E)","Min-cost max-flow","Bipartite matching (Hopcroft-Karp)","Hungarian algorithm O(n^3)","Tarjan SCC","Biconnected components","Bridges/articulation points"],
 study:"Dinic's max-flow uses BFS to build a layered graph, then finds blocking flows via DFS — O(V²E) overall, much faster than Ford-Fulkerson in practice. Min-cost max-flow finds the cheapest way to route maximum flow. Hungarian algorithm solves the assignment problem in O(n³). Tarjan's SCC runs in O(V+E) using low-link values.",
 tasks:[
  ["Implement","Dinic's max-flow: BFS level graph; DFS blocking flow with dead-end pruning; test: max bipartite matching, project selection problem; verify optimal vs brute on small inputs"],
  ["Implement","Min-cost max-flow (SPFA): find minimum cost augmenting path; augment along it; repeat; test: minimum cost assignment; compare to Hungarian for correctness"],
  ["Build","Hopcroft-Karp bipartite matching: BFS to find augmenting paths; DFS to augment multiple simultaneously; O(E√V); benchmark vs naive augmenting path on 1000-node bipartite graph"],
  ["Implement","Tarjan SCC: low-link + stack; find all SCCs in single DFS O(V+E); then Kosaraju (two DFS); verify same SCCs; benchmark both; test on random and adversarial graphs"],
  ["Implement","Bridges and articulation points: low-link DFS; identify bridge (u,v) when low[v]>disc[u]; test: verify all bridges in a known graph; remove one bridge at a time to disconnect"]
 ]},
{n:109,title:"String Algorithms",diff:"E",time:"5–6 h",prereqs:[15,26],
 concepts:["KMP (failure function)","Z-algorithm","Aho-Corasick","Suffix array (SA-IS)","LCP array (Kasai)","Suffix automaton","Rolling hash","Palindromic tree"],
 study:"KMP finds all pattern occurrences in O(n+m) using the failure function. Aho-Corasick extends to multiple patterns simultaneously. Suffix arrays enable all suffix queries in O(n log n) construction time with SA-IS. The suffix automaton is the most space-efficient suffix structure — O(n) nodes, accepts all substrings, enables counting distinct substrings in O(n).",
 tasks:[
  ["Implement","KMP: failure function (partial match table); search for pattern in text; find ALL occurrences; test: 'aaa' in 'aaaaaaa' finds 5; empty pattern; pattern longer than text"],
  ["Build","Aho-Corasick: build trie; compute failure links via BFS; multi-pattern search; count all occurrences of all patterns simultaneously; test: 100 patterns in 1MB text"],
  ["Implement","Suffix array (SA-IS O(n)): induced sorting algorithm; build SA in O(n); build LCP array via Kasai O(n); verify sorted suffixes; test on 1MB file"],
  ["Build","Suffix automaton: online O(n) construction; count distinct substrings; find longest repeated substring; find k-th lexicographically smallest substring; test vs brute force"],

{n:110,title:"Computational Geometry",diff:"E",time:"5–6 h",prereqs:[21,108],
 concepts:["Convex hull (Andrew monotone chain)","Line segment intersection","Point in polygon","Rotating calipers","Voronoi preview","Minkowski sum","Closest pair"],
 study:"Computational geometry handles floating-point precision carefully — use epsilon comparisons, not exact equality. Andrew's monotone chain finds the convex hull in O(n log n) with a clean two-pass algorithm. The closest pair algorithm achieves O(n log n) via divide and conquer. Rotating calipers compute diameter, width, and Minkowski sum of convex polygons efficiently.",

  ["Build","Closest pair: divide and conquer O(n log n); split by median x; solve left/right recursively; merge by scanning strip of width 2δ; verify vs O(n^2) on 10k points"],
  ["Implement","Point in polygon: ray casting algorithm; handle edge cases (on boundary, vertices); test: convex polygon, concave polygon, star-shaped; verify correct for 1000 test points"],

{n:111,title:"Number Theory & Combinatorics",diff:"E",time:"4–5 h",prereqs:[2,110],
 concepts:["Fast modular exponentiation","Miller-Rabin primality","Pollard rho factoring","Chinese Remainder Theorem","NTT (Number Theoretic Transform)","Berlekamp-Massey","Generating functions"],
 study:"Miller-Rabin is a probabilistic primality test — deterministic for n < 3.3×10²⁴ with fixed bases. NTT (Number Theoretic Transform) computes polynomial multiplication mod a prime in O(n log n) — used in competitive programming and cryptography. Berlekamp-Massey finds the shortest linear recurrence generating a sequence in O(n²).",

  ["Implement","Pollard rho factorization: Floyd cycle detection; factor large numbers; test: factor 10 semiprimes up to 10^18; compare to trial division speed; verify correctness"],
  ["Implement","NTT: Fast Number Theoretic Transform mod 998244353; polynomial multiply in O(n log n); test: multiply two degree-1000 polynomials; verify vs naive O(n^2)"],
  ["Build","Chinese Remainder Theorem: solve system of congruences x≡a_i (mod m_i); handle coprime AND non-coprime moduli (CRT fails gracefully); test: reconstruct secret sharing shares"],
  ["Implement","Berlekamp-Massey: find shortest LFSR for sequence; test: find recurrence for Fibonacci (x^2=x+1), Lucas, and 3 random linear recurrences of order 5,10,20"]
 ]},
{n:112,title:"Probabilistic & AI Search Algorithms",diff:"R",time:"5–6 h",prereqs:[111],
 concepts:["Bloom filter","Count-Min sketch","HyperLogLog","HNSW (Vector Search)","IVF-PQ","SimHash + LSH","Reservoir sampling","Randomized algorithms"],

{id:"p22",label:"Phase 22 — Language Design & Type Systems",
 col:"#f06292",bg:"#180810",txt:"#f090b0",tag:"Lang. Theory",

 items:[
{n:113,title:"Lambda Calculus & Type Theory",diff:"R",time:"6–7 h",prereqs:[69,70],
 concepts:["Untyped lambda calculus","Beta reduction","Church encoding","De Bruijn indices","Simply typed lambda calculus","Curry-Howard correspondence","System F preview"],
 study:"Lambda calculus is the FOUNDATION of all functional programming. Every computation can be expressed as lambda application and abstraction. Church encoding represents data (numbers, booleans, pairs, lists) as functions. The Curry-Howard correspondence maps types to logical propositions and programs to proofs — a profound unification between computation and logic.",
 tasks:[
  ["Implement","Untyped lambda calculus interpreter: parse λ-terms (λx.body, app, var); beta-reduce in normal order; detect non-termination with step limit; test: (λx.x)(λy.y) → λy.y"],
  ["Implement","Church encoding: true=λxy.x, false=λxy.y, 0=λfx.x, succ=λnfx.f(nfx); verify: add(2,3)=5 via reduction; iszero(0)=true; not(true)=false; fib(6)=8"],
  ["Implement","De Bruijn indices: convert named λ-terms to nameless; variable = distance to binding λ; shifting + substitution without name capture; verify reductions give same result"],
  ["Build","Simply typed lambda calculus: type inference via bidirectional checking; type error messages; test: (λ(x:int).x+1) 5 : int; (λ(x:int).x) true : TYPE ERROR"],
  ["Implement","Y combinator in untyped lambda calculus; implement factorial using Y; count reduction steps; show that simple typing rejects Y (recursive types needed)"]
 ]},
{n:114,title:"Hindley-Milner Type Inference",diff:"R",time:"6–7 h",prereqs:[113],
 concepts:["Type variables","Unification (Robinson)","Substitution composition","Generalization/instantiation","Let polymorphism","Occurs check","Algorithm W"],
 study:"Hindley-Milner type inference is the algorithm behind Haskell, OCaml, and ML. Algorithm W propagates constraints and unifies. Let polymorphism generalizes free type variables — that is why 'let id = fun x -> x in (id 5, id true)' works in ML. The occurs check prevents infinite types (α = α → β). Understanding HM makes you a better C++ programmer because concepts are HM-style constraints.",
 tasks:[
  ["Implement","Robinson unification: most general unifier (MGU) for two type terms; occurs check; compose substitutions left-to-right; test: unify (a→b) with (int→string); fail on a=a→b"],
  ["Build","Algorithm W: traverse expression; generate fresh type vars; unify constraints; generalize at let; instantiate at variable use; implement in C++ with full AST from your compiler"],
  ["Write","Type error messages: when unification fails, report expected type, actual type, source location, context; generate 5 test programs with type errors and human-readable messages"],
  ["Implement","Let polymorphism: generalize unbound type vars in let-binding; fresh instantiation at each use site; test: let id = λx.x; id 5; id true — BOTH must type-check"],
  ["Build","Full HM type inference for mini-ML: int/bool/string primitives, arithmetic, comparisons, let, fun, if/then/else, recursive let (let rec); test 20 programs"]
 ]},
{n:115,title:"Parsing Theory & Parser Combinators",diff:"E",time:"5–6 h",prereqs:[69,114],
 concepts:["LL(k) grammars","LR(k) grammars","LALR(1) (yacc/bison)","Earley parser (context-free)","Parser combinators","Packrat parsing (PEG)","Error recovery strategies","Incremental parsing"],
 study:"LL parsers read left-to-right and derive leftmost; LR parsers shift tokens and reduce. LALR(1) is used by yacc/bison — handles most programming language grammars. Earley parsing handles ALL context-free grammars in O(n³) worst case, O(n) for unambiguous. Parser combinators compose small parsers into larger ones — elegant but can be slow without memoization. Packrat parsing with memoization makes PEG parsers O(n).",
 tasks:[
  ["Implement","LL(1) parser: compute FIRST/FOLLOW sets; build parse table; parse using table + stack; test: arithmetic expressions grammar; detect ambiguity via FIRST/FOLLOW conflicts"],
  ["Implement","LR(0) parser: build item sets via closure/goto; construct ACTION/GOTO table; parse; handle shift-reduce conflicts; test: balanced parentheses, simple expression grammar"],
  ["Build","Parser combinator library: seq(p,q), choice(p,q), many(p), optional(p), satisfy(f), literal(s); build expression parser from combinators; test: same grammar as recursive descent"],
  ["Implement","Packrat / PEG parser with memoization: each rule memoized at each position; O(n) parsing; handle ordered choice (PEG) vs ambiguous choice (CFG); test: Python-like indentation"],
  ["Write","Error recovery: on syntax error, skip to synchronization token (';', '}', keyword); collect multiple errors; continue parsing; test: program with 5 syntax errors, report all"]
 ]},
{n:116,title:"IR Design & Optimization Passes",diff:"E",time:"6–7 h",prereqs:[70,71,115],
 concepts:["SSA form (Static Single Assignment)","Phi nodes","Dominance frontier","Dead code elimination","Constant propagation","Common subexpression elimination","Strength reduction","Loop invariant code motion"],
 study:"SSA form is the FOUNDATION of modern compiler optimization. Every variable is assigned exactly once — use phi nodes at join points where multiple paths merge. Dominance frontiers determine exactly where phi nodes are needed. Most modern optimizations (GVN, LICM, CSE) are simpler and more powerful in SSA form. LLVM uses SSA internally for all its hundreds of optimization passes.",
 tasks:[
  ["Implement","SSA construction: convert CFG to SSA via Cytron's algorithm; compute dominator tree; compute dominance frontiers; insert phi nodes; rename variables; verify SSA property"],
  ["Build","Constant folding + propagation: evaluate compile-time constants; propagate through SSA use-def chains; eliminate dead branches when condition is constant; test: 5 programs"],
  ["Implement","Dead code elimination: mark live instructions from outputs backwards; delete all unmarked; DCE on SSA is trivial (each var defined once, zero uses → dead); test"],
  ["Build","GVN (Global Value Numbering): assign value numbers; find redundant computations; replace with earlier equivalent; test: eliminate CSE across basic block boundaries"],
  ["Implement","LICM (Loop Invariant Code Motion): identify loop-invariant instructions; hoist to loop preheader; verify correctness; measure: hoist from loop executed 10^6 times → 1x execution"]
 ]},
{n:117,title:"LLVM Integration",diff:"E",time:"6–7 h",prereqs:[116],
 concepts:["LLVM IR (SSA-based, typed)","IRBuilder API","Module/Function/BasicBlock/Instruction","Pass Manager","LLVM analysis passes","JIT via LLJIT","MLIR preview"],
 study:"LLVM IR is a typed, SSA-based intermediate representation. IRBuilder provides a C++ API for generating IR programmatically. The Pass Manager runs optimization passes in a scheduled order, managing IR analyses and transformations. LLJIT compiles LLVM IR to native code at runtime — enabling JIT compilation via the LLVM infrastructure. MLIR generalizes LLVM IR to multiple abstraction levels.",
 tasks:[
  ["Build","LLVM IR generator: take your Phase 11 AST; emit correct LLVM IR using IRBuilder; test: functions, arithmetic, conditionals, loops, global variables — assemble with llc"],
  ["Write","LLVM function pass: traverse IR; collect all binary instructions; report opcode histogram; register with PassManager; run on real codebases; report interesting patterns"],
  ["Build","LLVM optimization pass: detect and eliminate redundant loads (x = load; use x; y = load same addr → replace y with x); test on 5 programs; verify no semantic change"],
  ["Implement","JIT via LLJIT: parse LLVM IR; JIT compile to native; get function pointer; call from C++; test: JIT compile fibonacci; call with argument 40; measure JIT startup time"],
  ["Write","Custom LLVM IR dialect: extend IRBuilder to emit custom intrinsics; write a pass that lowers them to standard IR; test: custom matrix multiply intrinsic lowered to BLAS call"]
 ]}
]},

{n:118,title:"WebAssembly & Portable C++",diff:"E",time:"5–6 h",prereqs:[91],

 study:"WebAssembly is a binary instruction format designed as a compilation target for C/C++/Rust. Emscripten compiles C++ to WASM via LLVM. WASI provides a portable system interface — file I/O, networking — making WASM run outside the browser. WASM SIMD extends WASM with 128-bit SIMD operations. This enables C++ code to run in browsers at near-native speed.",
