{n:119,title:"GPU Computing Beyond CUDA — OpenCL & Vulkan Compute",diff:"E",time:"6–7 h",prereqs:[96],

{n:120,title:"Formal Methods & Program Verification",diff:"R",time:"6–7 h",prereqs:[88,89],
 concepts:["Hoare triples {P}C{Q}","Weakest precondition","Invariant inference","Model checking (SPIN/NuSMV)","SAT/SMT solvers (Z3)","Separation logic","Ownership types","Rust borrow checker insights"],
 study:"Formal verification proves programs correct — not just tests them. Hoare triples {P}C{Q}: if precondition P holds before executing C, postcondition Q holds after. Model checking exhaustively explores all states — infeasible for large systems but perfect for protocols. SMT solvers (Z3) can prove properties of C++ programs automatically via bounded model checking.",
 tasks:[
  ["Write","Hoare logic proofs: annotate 5 C++ functions with preconditions, postconditions, and loop invariants; verify each invariant is maintained by the loop body; verify postcondition follows"],
  ["Build","Z3 interface from C++: formulate 3 program safety properties as SMT queries; call Z3 API; verify properties or get counterexample; test: buffer bounds, arithmetic overflow freedom"],
  ["Implement","Bounded model checker: enumerate all paths up to depth 10; check assertion at each step; encode program state as SAT formula; use minisat to find violation; test on simple loops"],
  ["Write","Separation logic specifications: write specs for linked list insert/delete/search; heap ownership predicates; verify no aliasing via separation; compare to Rust ownership model"],
  ["Read","'Software Foundations' Vol 1 Ch 1-6 (Pierce et al.); implement the Imp language from the book in C++; verify 3 example programs with Hoare logic; connect to your Phase 11 compiler"]
 ]},
{n:121,title:"Low-Level Networking — DPDK & Kernel Bypass",diff:"R",time:"6–7 h",prereqs:[61,62,96],
 concepts:["DPDK poll-mode drivers","Hugepages for DPDK","DPDK mbuf (message buffer)","RSS (Receive Side Scaling)","DPDK EAL (Environment Abstraction Layer)","XDP (eXpress Data Path)","AF_XDP","eBPF programs","Kernel bypass patterns"],
 study:"DPDK bypasses the Linux kernel entirely for packet processing — poll-mode drivers in userspace, hugepage-backed mbufs, zero-copy. This enables 10–100M packets/second per core. XDP/eBPF allows running custom packet processing programs INSIDE the kernel at the point packets arrive — without the overhead of socket calls. AF_XDP bridges XDP and userspace.",
 tasks:[
  ["Setup","DPDK environment: hugepages (2MB), bind NIC to igb_uio or vfio-pci; run l2fwd sample; verify packet forwarding; measure packets/second with pktgen"],
  ["Build","DPDK packet counter: poll RX ring; count packets by protocol; forward or drop; measure: achieve >10M packets/second on a 10GbE NIC with one core"],
  ["Write","eBPF XDP program: parse Ethernet+IP+TCP headers at XDP hook; count packets by source IP; drop packets from blacklisted IPs; load with libbpf; verify with bpftool"],
  ["Build","AF_XDP socket: attach XDP program; pass packets to AF_XDP socket in userspace; zero-copy receive via UMEM; process packets in userspace; forward back with TX queue"],
  ["Implement","DPDK-based UDP echo server: receive UDP packets; swap src/dst IP+port; send back; measure round-trip latency (target: <5μs); compare to kernel UDP socket latency"]
 ]},
{n:122,title:"Embedded Systems — ARM Cortex-M",diff:"E",time:"6–7 h",prereqs:[55,60,75],
 concepts:["ARM Cortex-M architecture","Thumb-2 instruction set","CMSIS (hardware abstraction)","Startup code (.s file)","Linker script for embedded","Interrupt vector table","HAL vs bare metal","JTAG/SWD debugging"],
 study:"ARM Cortex-M is THE dominant embedded processor family (billions of chips). Cortex-M runs Thumb-2 16/32-bit instructions. There is NO OS — your startup code runs first, sets up the stack, calls constructors, then main(). The vector table maps interrupt numbers to handler addresses. CMSIS provides a vendor-neutral abstraction. Understanding embedded C++ requires knowing EVERY byte of your binary.",
 tasks:[
  ["Write","Bare-metal startup for STM32F4: .s startup file that sets stack pointer, copies .data, zeros .bss, calls __libc_init_array, jumps to main; verify with GDB in QEMU STM32"],
  ["Write","Linker script: MEMORY regions (FLASH, RAM, CCMRAM); SECTIONS (.text→FLASH, .data/.bss→RAM); PROVIDE(__stack_end, RAM end); verify with objdump -h that sections are correct"],
  ["Implement","Interrupt vector table in C++: __attribute__((section('.isr_vector'))) constexpr function pointer array; handler for SysTick, USART1_IRQ, TIM2_IRQ; test with QEMU"],
  ["Build","Bare-metal GPIO driver: STM32F4 GPIO registers (MODER, BSRR, IDR); blink LED at 1Hz using SysTick; read button; no HAL library; verify with QEMU or hardware"],
  ["Write","RTOS-less task scheduler for Cortex-M: SysTick handler saves context to TCB; loads next TCB; simple round-robin; test: 3 tasks print different LED patterns via GPIO"]
 ]},
{n:123,title:"Database Internals",diff:"R",time:"7–8 h",prereqs:[55,56,67],
 concepts:["Buffer pool manager","B+ tree for storage","WAL (Write-Ahead Log)","MVCC (Multi-Version Concurrency Control)","LSM tree (Log-Structured Merge)","Query execution (volcano model)","Columnar storage","OLAP vs OLTP"],
 study:"A database storage engine's core components: buffer pool (cache of disk pages), B+ tree index, WAL for durability, and MVCC for concurrent transactions. LSM trees trade write amplification for better write throughput — used in LevelDB, RocksDB. Understanding internals makes you far better at using databases and explains why query plans matter.",
 tasks:[
  ["Implement","Buffer pool manager: fixed-size page cache; LRU eviction; dirty page tracking; pin/unpin pages; test: 1000 page requests with working set larger than cache; measure hit rate"],
  ["Build","B+ tree for storage engine: leaf nodes hold data; internal nodes hold separator keys; insert splits, delete merges/redistributes; range scan via leaf chaining; test 1M inserts"],
  ["Implement","WAL (Write-Ahead Log): log every modification before applying it; crash recovery replays WAL from last checkpoint; test: simulate crash mid-transaction; verify recovery restores consistency"],
  ["Build","LSM tree: MemTable (sorted in-memory); flush to SSTable (sorted immutable file); compaction merging SSTables; bloom filter per SSTable; range scan across levels; test 10M writes"],
  ["Implement","Volcano model query executor: TableScan, Filter, Project, HashJoin, Sort, GroupBy operators; compose via iterator interface; execute: SELECT sum(salary) FROM emp WHERE dept='eng' GROUP BY year"]
 ]},
{n:124,title:"Cryptography in C++",diff:"E",time:"5–6 h",prereqs:[74,111],
 concepts:["AES (block cipher)","ChaCha20 (stream cipher)","SHA-256/SHA-3 (hash)","HMAC","RSA key generation","Elliptic curve (Curve25519)","TLS 1.3 handshake","Constant-time implementation","Side-channel attacks"],
 study:"Implementing cryptography correctly requires: constant-time operations (no secret-dependent branches/memory access), proper key derivation, authenticated encryption (AEAD — confidentiality + integrity together). AES-GCM combines AES encryption with GHASH authentication. ChaCha20-Poly1305 is the modern alternative — simpler, faster on CPUs without AES-NI. Never implement cryptography for production — use libsodium. But UNDERSTANDING it is essential.",
 tasks:[
  ["Implement","AES-128 encryption: key expansion (10 rounds); SubBytes (S-box); ShiftRows; MixColumns; AddRoundKey; test against NIST test vectors; verify identical to OpenSSL AES"],
  ["Implement","ChaCha20 stream cipher: 20-round quarter-round function; counter mode; test against RFC 8439 test vectors; benchmark vs AES-CTR on CPU without AES-NI"],
  ["Implement","SHA-256: message schedule; 64 rounds; compression function; padding; test against NIST vectors for empty string, 'abc', 448-bit, 512-bit messages"],
  ["Build","HMAC-SHA256: inner and outer padding (ipad/opad); test against RFC 4231 test vectors; implement HKDF (HMAC-based key derivation function) for deriving session keys"],
  ["Write","Constant-time comparison: compare 32-byte MACs with no early exit; verify constant-time with timing measurements; compare to naive memcmp; explain timing oracle attack"]
 ]},
{n:125,title:"Memory Safety & Sanitizers Deep Dive",diff:"E",time:"5–6 h",prereqs:[89,74],
 concepts:["ASan shadow memory algorithm","TSan shadow memory for happens-before","UBSan instrumentation","MSan (MemorySanitizer)","LibFuzzer internals","Coverage-guided fuzzing","Mutation strategies","Corpus distillation"],
 study:"AddressSanitizer uses shadow memory: every 8 bytes of application memory maps to 1 byte of shadow memory encoding which bytes are valid. On every memory access, ASan checks the shadow byte. TSan uses a similar shadow to track happens-before relationships between threads. Understanding sanitizer internals helps you write faster sanitizer-compatible code and understand their limitations.",
 tasks:[
  ["Build","Mini AddressSanitizer: shadow memory mapping (application addr → shadow addr via shift+offset); intercept malloc/free; poison freed memory; check on every access via compiler instrumentation"],
  ["Implement","TSan vector clock logic: each memory location stores a vector clock; each thread has a vector clock; on access, check if clocks are ordered; if not, data race; test on 10 racy programs"],
  ["Write","Coverage-guided fuzzer from scratch: instrument code to track basic block coverage; mutate corpus; keep inputs that increase coverage; find bugs; compare to libFuzzer on same target"],
  ["Build","Structured fuzzer: grammar-based input generation for JSON parser; custom mutators that produce syntactically valid JSON with semantic variations; compare coverage vs dumb fuzzer"],
  ["Write","Sanitizer benchmarks: measure runtime overhead of ASan, TSan, UBSan, MSan on 5 real programs; compare coverage achieved by fuzzing with vs without each sanitizer; find tradeoffs"]
 ]},
{n:126,title:"High-Performance Networking — TCP/IP Internals",diff:"R",time:"6–7 h",prereqs:[62,63,121],
 concepts:["TCP slow start + congestion avoidance (AIMD)","CUBIC + BBR congestion control","TCP Fast Open","QUIC (HTTP/3)","RDMA (Remote Direct Memory Access)","io_uring for networking","Kernel NIC driver internals","RSS + RPS"],
 study:"TCP congestion control evolved from AIMD to CUBIC to BBR (Bottleneck Bandwidth and RTT). BBR estimates available bandwidth and RTT directly — achieving higher throughput at the same loss rate as CUBIC. QUIC reimplements transport in userspace (over UDP) with 0-RTT connection establishment and head-of-line blocking elimination. RDMA bypasses the CPU entirely for data movement between nodes.",
 tasks:[
  ["Implement","TCP congestion control simulation: AIMD (slow start, congestion avoidance, fast retransmit, fast recovery); simulate 100ms RTT, 1% loss; plot cwnd over time; compare to ns3"],
  ["Build","CUBIC congestion control: cubic window growth function; beta for multiplicative decrease; W_max tracking; implement and plot cwnd vs time; compare to AIMD on same simulated network"],
  ["Implement","QUIC packet format parsing: parse Initial packets (CRYPTO frames for TLS 1.3 handshake); stream frames; ACK frames; test with captured QUIC traffic from curl --http3"],
  ["Build","Zero-copy TCP sendmsg: writev() with MSG_ZEROCOPY flag; register memory with kernel; verify zero copies with perf trace; measure throughput vs regular send()"],
  ["Write","RDMA simulation: implement verbs API semantics (post_send, poll_cq, reg_mr) over shared memory; test producer-consumer at memory bandwidth; discuss how real InfiniBand works"]
 ]},
{n:127,title:"Game Engine Architecture",diff:"E",time:"6–7 h",prereqs:[67,45,87],
 concepts:["Entity Component System (ECS)","SoA layout for cache friendliness","Fixed-timestep game loop","Spatial partitioning (BVH, octree)","Job system for parallelism","Render graph","Asset pipeline","Hot reload"],
 study:"ECS (Entity Component System) separates identity (entity = integer ID) from data (components = SoA arrays) from logic (systems = functions over component arrays). This SoA layout enables SIMD-vectorized processing of thousands of entities. A fixed-timestep game loop decouples physics updates from rendering — prevents simulation errors from variable frame rate. The job system distributes ECS system processing across CPU cores.",
 tasks:[
  ["Build","ECS core: entity = uint32_t (index + generation); component arrays in SoA layout; archetype-based storage (entities with same component set share arrays); benchmark: 10M entity position update"],
  ["Implement","Fixed-timestep game loop: accumulator pattern; physics at 60Hz fixed; render at variable rate; interpolate render position between physics steps; verify no spiral of death"],
  ["Build","BVH (Bounding Volume Hierarchy): build top-down with SAH (Surface Area Heuristic); ray-AABB intersection; traverse to find hit; rebuild vs refit tradeoff; test: 10k AABBs, 1M rays"],
  ["Implement","ECS job system: topological sort of system dependencies; run independent systems in parallel; handle read/write component access correctly; test: 16 systems, 8 threads, 1M entities"],
  ["Build","Asset pipeline: binary asset format with versioning; hot reload via inotify; asset reference counting; async loading with job system; test: reload shader/texture while game runs"]
 ]},
{n:128,title:"Advanced Concurrency — Work Stealing & Parallelism",diff:"R",time:"6–7 h",prereqs:[47,48,67],
 concepts:["Work-stealing deque (Chase-Lev)","Parallel scan and reduce","Parallel sort (parallel merge sort, sample sort)","Task graphs with dependencies","Transactional memory (preview)","NUMA-aware scheduling","Hardware thread topology"],
 study:"Work-stealing deques allow threads to pop from their own queue (bottom) and steal from others (top) — Chase-Lev deque achieves this with just a bottom counter and a top atomic. Parallel scan (prefix sum) is the foundation of parallel algorithms — implemented in O(n/p + log p) work and O(log p) depth. Sample sort generalizes merge sort to p processors with O(n log n / p) work.",
 tasks:[
  ["Implement","Chase-Lev work-stealing deque: push/pop at bottom; steal at top via CAS; ABA prevention; test with 8 threads each doing push-pop and stealing; verify TSan clean"],
  ["Build","Work-stealing thread pool: each thread has a local deque; tasks can spawn child tasks into local deque; idle threads steal; test: parallel Fibonacci with task spawning; measure work distribution"],
  ["Implement","Parallel prefix sum (scan): up-sweep (reduce) + down-sweep; O(n) work, O(log n) depth; test on 10^8 elements; verify identical to serial scan; benchmark vs OpenMP parallel scan"],
  ["Build","Sample sort: pick p² random samples; sort samples; pick p-1 splitters; partition data; parallel sort each partition; merge; test 100M elements on 8 threads; verify sorted"],
  ["Implement","Task graph executor: tasks with data dependencies (edges); topological order; ready queue; execute with N workers; test: matrix chain multiplication as task graph; dependency violation detection"]
 ]},
{n:129,title:"Production Engineering & SRE Practices",diff:"I",time:"5–6 h",prereqs:[82,87],

 tasks:[
  ["Implement","Circuit breaker: CLOSED (normal) → OPEN (failing) → HALF-OPEN (testing); count failures; open after 5 failures in 60s; half-open after 30s; close after 1 success; test state transitions"],

  ["Write","Structured error handling: error type hierarchy; error codes; stack traces; error context propagation; map to HTTP status codes; log structured JSON; test 10 error scenarios"],
  ["Implement","Graceful degradation: primary path (full feature); fallback path (degraded feature); circuit breaker connects them; test: primary fails; verify fallback activates in <100ms"],
  ["Build","Health check server: liveness probe (process alive), readiness probe (can serve traffic), startup probe (initialized); expose as HTTP /health/live /health/ready; test with Kubernetes-style polling"]
 ]},
{n:130,title:"Advanced Template Patterns & C++23/26 Preview",diff:"R",time:"6–7 h",prereqs:[90,91],
 concepts:["std::expected<T,E> (C++23)","Deducing this (C++23)","std::flat_map/flat_set (C++23)","std::mdspan (multidimensional span)","std::generator<T> (C++23)","Static reflection (C++26 preview)","Pattern matching (C++26 preview)","Contracts (C++26 preview)"],

 ]}

 items:[
{n:131,title:"Integration: Build a Redis-Compatible Server",diff:"R",time:"10–12 h",prereqs:[44,45,61,62],
 concepts:["RESP3 protocol parsing","Hash table internals (Redis uses custom HT)","Expiry with lazy+active eviction","Persistence (RDB snapshots, AOF logging)","Pub/Sub","Cluster mode preview","Lua scripting preview"],
 study:"Redis is the most studied high-performance server in history. Its design choices: single-threaded event loop (avoids lock overhead), custom hash table with incremental rehashing (no stop-the-world resize), jemalloc memory allocator. Building a Redis-compatible server integrates: protocol parsing, event loop, data structures, persistence, and expiry — all from this roadmap.",
 tasks:[
  ["Implement","RESP3 protocol parser: inline commands, bulk strings, arrays, inline errors; write a state machine parser; handle partial reads; test against redis-cli"],
  ["Build","Event loop with epoll: accept connections; parse RESP3 commands; dispatch to handler; send response; handle 10,000 concurrent clients; benchmark with redis-benchmark"],
  ["Implement","Core commands: SET/GET/DEL/EXISTS/EXPIRE/TTL/KEYS; hash table with incremental rehashing (never stops event loop); lazy expiry (check on access); active expiry (background scan)"],
  ["Add","List/Hash/Set/ZSet commands: LPUSH/LPOP/LRANGE; HSET/HGET/HGETALL; SADD/SMEMBERS/SINTER; ZADD/ZRANGE/ZRANGEBYSCORE; use appropriate internal structures"],
  ["Build","RDB snapshot: fork child; child serializes all data to binary file; parent continues serving; atomic rename on complete; test: save, kill server, restore from RDB"]
 ]},
{n:132,title:"Integration: Build a Mini Kubernetes-Style Scheduler",diff:"R",time:"10–12 h",prereqs:[44,79,80,81],
 concepts:["Resource model (CPU/memory requests+limits)","Node scoring algorithms","Preemption","Affinity/anti-affinity rules","Watch API (long-polling)","etcd-style consistent KV","Reconciliation loops"],
 study:"Kubernetes scheduling is a fascinating optimization problem: pack N workloads into M nodes maximizing utilization, honoring constraints, and tolerating failures. The scheduler watches for unscheduled pods, runs predicates (node must have enough CPU), runs priorities (score nodes by available resources), and assigns. Reconciliation loops continuously drive actual state toward desired state.",
 tasks:[
  ["Build","Resource model: Node(cpu_cores, memory_gb, available_cpu, available_memory); Pod(cpu_request, memory_request, node_affinity); assign pod to node; verify resource constraints"],
  ["Implement","Scheduler predicates: NodeHasResources(pod,node), NodeMatchesAffinity(pod,node), TaintToleration(pod,node); filter candidate nodes; return list of feasible nodes"],
  ["Implement","Priority scoring: LeastAllocated (prefer nodes with most free resources), BalancedAllocation (balance CPU+memory), ImageLocality; combine scores; pick highest scored node"],
  ["Build","Reconciliation controller: watch desired pod list; compare to running pods; schedule missing pods; evict extra pods; retry failed scheduling with exponential backoff"],
  ["Write","Preemption: when no node fits, find lowest-priority pods to evict; verify eviction frees enough resources; schedule high-priority pod; test with 100 pods and 10 nodes"]
 ]},
{n:133,title:"Integration: Build a High-Performance JSON Parser",diff:"E",time:"6–8 h",prereqs:[4,66,29],
 concepts:["SIMD JSON parsing (simdjson approach)","Two-phase parsing","Structural character detection","Tape-based output","DOM vs SAX vs tape","Error recovery","Zero-copy string handling"],
 study:"simdjson achieves 3+ GB/s JSON parsing by using SIMD to find structural characters ('{','}','[',']',':',',','\"') in 32-byte batches, then a stage-2 parser that walks the tape structure. This is orders of magnitude faster than character-at-a-time parsing. Understanding simdjson teaches you how SIMD transforms algorithm design.",
 tasks:[
  ["Implement","Stage 1 structural indexing: use _mm256_cmpeq_epi8 to find all structural characters in 32 bytes at once; build index of positions; handle escaped quotes inside strings"],
  ["Build","Stage 2 tape-based parser: walk structural index; emit typed tape tokens (start_object, key, string, number, end_object); no heap allocation; test on 100MB JSON file"],
  ["Implement","Number parsing: fast integer path (no floating point for integers); JSON number to double via Ryu algorithm; test all JSON number edge cases including 1e308"],
  ["Build","DOM API over tape: JsonValue with type(), as_string(), as_int64(), operator[](key), operator[](index), begin()/end() for iteration; zero-copy string_view for strings"],
  ["Benchmark","Your parser vs simdjson vs rapidjson vs nlohmann_json: parse 1GB of real-world JSON; measure throughput (MB/s); find what limits your speed; optimize to within 2x of simdjson"]
 ]},
{n:134,title:"Integration: Build a Thread-Safe Memory Pool",diff:"E",time:"5–6 h",prereqs:[55,56,46,67],
 concepts:["Thread-local caches","Lock-free free list","Central heap with sharded locks","Size classes","Batch allocation/deallocation","Fragmentation tracking","mimalloc-style design"],
 study:"mimalloc (Microsoft's allocator) achieves best-in-class performance via: thread-local heaps with no synchronization in common case, bump pointer allocation in small segments, free list sharding to avoid contention, deferred freeing of remote frees. Understanding its design synthesizes everything from this roadmap: atomics, cache friendliness, NUMA awareness, pool allocation.",
 tasks:[
  ["Build","Thread-local heap: each thread allocates from its own segment (2MB); bump pointer within segment; no locks in common path; profile: verify zero atomic operations during allocation"],
  ["Implement","Free list management: freed objects go to thread-local free list; batched transfer to central heap when TL list is full; central heap uses lock-free CAS for returns"],
  ["Add","Size classes: 8,16,32,64,128,256,512,1024,2048,4096 bytes + large; separate pool per size class per thread; verify: right size class chosen for every allocation size"],
  ["Implement","Remote free: when thread A frees memory allocated by thread B, put on B's deferred-free list; B processes deferred list on next allocation; test: 4 producer threads + 1 consumer"],
  ["Benchmark","Your allocator vs mimalloc vs jemalloc vs tcmalloc vs ptmalloc2: cache-thrash benchmark, larson multi-threaded benchmark, xmalloc-test; plot all; analyze where yours underperforms"]
 ]},
{n:135,title:"Integration: Build a Time-Series Database",diff:"R",time:"8–10 h",prereqs:[55,58,64,67],
 concepts:["Delta-of-delta compression","XOR float compression (Gorilla)","Time-series specific indexing","Chunk-based storage","Retention policies","Downsampling","PromQL-like query language preview"],
 study:"Time-series databases like Prometheus and InfluxDB use specialized compression: delta-of-delta encoding for timestamps (the change-in-change is usually near 0), XOR compression for float values (Gorilla algorithm from Facebook). These achieve 12:1 compression on typical metrics. Understanding this synthesizes: bit manipulation, compression theory, cache-friendly storage, and query execution.",
 tasks:[
  ["Implement","Gorilla XOR float compression: store first value as-is; subsequent values as XOR with previous; encode XOR using leading zeros + meaningful bits; test: 10k random float64s; measure ratio"],
  ["Implement","Delta-of-delta timestamp compression: first timestamp as-is; deltas usually same (1s interval); delta-of-delta usually 0; variable-length encode; test: 1 sample/second for 1 hour; measure bits/sample"],
  ["Build","Chunk storage: time-series data in 2-hour chunks; each chunk: header (series ID, start time, count) + compressed data; mmap-based storage; chunk cache with LRU eviction"],
  ["Implement","Series index: label-set to series ID mapping; inverted index label→[series IDs]; AND/OR query of label matchers; test: find all series with {job='api', env='prod'}"],
  ["Build","Query executor: select metric in time range; decompress chunks; filter by time range; aggregate (sum, avg, rate, histogram_quantile) over matching series; output as time,value pairs"]
 ]},
{n:136,title:"Integration: Implement a Garbage Collector",diff:"R",time:"8–10 h",prereqs:[18,57,46],
 concepts:["Mark-and-sweep","Tri-color marking (write barrier)","Stop-the-world vs concurrent GC","Generational collection","Conservative vs precise GC","Compacting GC","Boehm GC design","Reference counting tradeoffs"],
 study:"Implementing a GC teaches you everything about memory management that manual C++ doesn't. Mark-and-sweep: mark all reachable objects from roots; sweep all unreachable. Tri-color marking enables concurrent GC — white (not seen), grey (seen, children not done), black (done). Write barriers maintain the tri-color invariant concurrently with mutator. Generational GC exploits the observation that most objects die young.",
 tasks:[
  ["Implement","Mark-and-sweep GC: allocate objects with GC header; maintain root set (stack roots, globals); DFS mark phase; sweep phase reclaims unmarked; test: linked list, tree, graph with cycles"],
  ["Build","Tri-color marking for concurrent GC: white/grey/black state per object; DFS marks grey→black; write barrier makes cross-color pointers grey; test: GC running concurrently with allocation"],
  ["Implement","Generational GC: young generation (eden + survivor); promote long-lived objects to old gen; minor GC collects young only; major GC collects all; verify promotion works correctly"],
  ["Build","Compacting GC: mark live objects; compute forwarding addresses; update all pointers; move objects; free old locations; test: heap compaction reduces fragmentation by 2x"],
  ["Benchmark","Your GC vs reference counting (shared_ptr) vs manual new/delete: allocation throughput; collection pause time; peak memory; test workloads: long-lived tree, short-lived objects, cyclic graphs"]
 ]},
{n:137,title:"Integration: GPU-Accelerated Image Processing Pipeline",diff:"E",time:"6–8 h",prereqs:[66,94,96],
 concepts:["Image convolution on GPU","Separable filters","Gaussian blur","Sobel edge detection","Morphological operations","CUDA texture memory","GPU-CPU pipeline overlap","OpenCV + CUDA integration"],
 study:"Image processing is naturally parallel — each pixel computation is independent. GPU acceleration gives 100x speedup on convolutions. Separable filters (Gaussian is separable) reduce 2D convolution from O(k²) to O(2k) operations per pixel. CUDA texture memory gives hardware bilinear interpolation and optimized 2D cache behavior for image access patterns.",
 tasks:[
  ["Implement","2D convolution CUDA kernel: tiled shared memory; handle border (clamp/wrap/mirror); test: apply 5x5 sharpen kernel to 4K image; verify matches CPU reference within 1e-4"],
  ["Build","Separable Gaussian blur: horizontal pass then vertical pass; reuse shared memory between passes; test: compare to 2D Gaussian; verify identical within floating-point precision"],
  ["Implement","Sobel edge detection: Gx and Gy kernels; magnitude = sqrt(Gx²+Gy²); apply to grayscale image; test on camera input; compare to cv::Sobel timing"],
  ["Build","GPU image processing pipeline: CUDA streams for overlap; async CPU→GPU transfer while GPU processes previous frame; GPU processes while CPU does async GPU→CPU; measure end-to-end FPS"],
  ["Integrate","OpenCV + CUDA: cv::cuda::GpuMat; upload image; run CUDA custom kernel on GpuMat data; download; display; build complete pipeline: capture → denoise → edge → classify → display at 30 FPS"]
 ]},
{n:138,title:"Integration: Implement a Language Server Protocol (LSP) Server",diff:"R",time:"8–10 h",prereqs:[68,69,70,81],
 concepts:["LSP protocol (JSON-RPC over stdio/TCP)","Document synchronization","Go-to-definition","Find references","Hover documentation","Semantic highlighting","Diagnostics","Incremental parsing"],
 study:"LSP (Language Server Protocol) decouples language intelligence from editors — one C++ language server works with VS Code, Vim, Emacs. Building an LSP server requires: JSON-RPC protocol handling, incremental document synchronization, parsing code as you type, maintaining a symbol table across edits, and providing completions/hover/diagnostics. This integrates your entire compiler pipeline.",
 tasks:[
  ["Implement","JSON-RPC protocol handler: read Content-Length framed messages from stdin; parse JSON; dispatch to method handlers; send JSON responses; handle notifications vs requests"],
  ["Build","Document synchronization: textDocument/didOpen, didChange (incremental deltas), didClose; maintain in-memory source text; apply incremental edits without re-parsing everything"],
  ["Implement","Go-to-definition: parse document; build symbol table; on textDocument/definition request; find symbol under cursor; return location {uri, range}; test in VS Code"],
  ["Build","Diagnostics: on document change, re-parse; collect syntax errors and type errors; send textDocument/publishDiagnostics with range and message; test: incorrect C++ shows red squiggle"],
  ["Implement","Hover documentation: on textDocument/hover; find symbol under cursor; look up type and documentation comment; return formatted markdown; test: hover over variable shows type"]
 ]},
{n:139,title:"Integration: Build a P2P Distributed Hash Table (Chord)",diff:"R",time:"8–10 h",prereqs:[62,79,80],
 concepts:["Chord DHT protocol","Consistent hashing","Finger table","Successor/predecessor pointers","Join/leave/stabilize","Lookup in O(log N) hops","Replication","Failure handling"],
 study:"Chord is the canonical DHT algorithm — keys are hashed to a ring [0, 2^m); each node is responsible for keys between its predecessor and itself. Finger tables enable O(log N) lookup: finger[i] = node responsible for (n + 2^i) mod 2^m. This integrates networking, consistent hashing, distributed protocols, and failure handling — all from this roadmap.",
 tasks:[
  ["Implement","Consistent hashing ring: SHA-1 hash to 160-bit ring; node placement; key → responsible node lookup; test: 10 nodes, 1000 keys; verify uniform distribution"],
  ["Build","Chord node: TCP listener; successor/predecessor pointers; finger table (160 entries); join(known_node): find position, initialize fingers; stabilize() and fix_fingers() background tasks"],
  ["Implement","Lookup(key): route to responsible node in O(log N) hops; use finger table to jump; test: lookup 1000 keys in 20-node ring; verify correct node found every time"],
  ["Build","Replication: store key on k=3 consecutive nodes; consistent read with quorum (2 of 3 agree); test: kill 2 of 3 replicas; verify key still readable from 1 survivor"],
  ["Test","Churn test: 20 nodes; join 5 new nodes; leave 5 nodes simultaneously; verify all keys still findable after stabilization; measure how long until ring is stable"]
 ]},
{n:140,title:"Integration: Build a Custom Protocol with C++ DSL",diff:"R",time:"6–8 h",prereqs:[36,37,38,81],
 concepts:["Domain-specific language in C++","Protocol schema as C++ types","Zero-copy serialization","Reflection-based codec","Wire format design","Backward compatibility","Schema evolution"],
 study:"Building a protocol DSL in C++ (like Cap'n Proto or FlatBuffers but simpler) synthesizes: templates, concepts, reflection, and serialization. The goal: define a schema as C++ types, and get zero-copy serialization/deserialization for free. This is how Google's Protocol Buffers and Cap'n Proto work internally — though they generate code, yours will use C++ reflection instead.",
 tasks:[
  ["Design","Protocol schema: PROTOCOL_FIELD(name, type, id) macro; PROTOCOL_MESSAGE(name, fields...) aggregates fields; generate serialization methods via X-macro; test 5 message types"],
  ["Implement","Binary wire format: fixed-size fields packed; variable-length fields (string, bytes) with 4-byte length prefix; nested messages; repeated fields; ensure alignment safe on all platforms"],
  ["Build","Zero-copy deserialization: place MessageView<T> over raw buffer without copying; fields accessed via offset calculation; strings returned as string_view into buffer; test against generated struct"],
  ["Implement","Schema evolution: add optional field with default; old reader ignores unknown fields; new reader uses default for missing fields; test: old writer → new reader, new writer → old reader"],
  ["Write","Code generator alternative: Python script reads .proto-like schema; generates C++ header with structs + serialization; compare to template-based approach; benchmark both; measure code clarity"]
 ]},
{n:141,title:"Mastery: C++ Idiomatic Code Review",diff:"I",time:"4–5 h",prereqs:[],
 concepts:["Code smell detection","RAII violations","Ownership clarity","Const correctness","Interface design","Naming conventions","Error handling patterns","Documentation standards"],

  ["Write","Code review checklist: 30 items covering: memory management, concurrency, error handling, API design, performance, const correctness, exception safety — each with example"],
  ["Build","Automated style checker: clang-tidy custom check that detects raw new/delete in application code (not in RAII wrappers); suggest fix; test on 3 real codebases"],
  ["Present","Pick one of your Phase 0-20 projects; write a detailed self-review identifying 10 things you'd do differently now; implement 5 of the improvements; document before/after"]
 ]},
{n:142,title:"Mastery: Performance Case Study — Hash Table to 1 Billion ops/sec",diff:"R",time:"8–10 h",prereqs:[28,64,65,66,67],
 concepts:["Open addressing variants","Robin Hood hashing","SIMD probing","Tombstone alternatives","Fingerprint-based early rejection","Batch lookup","Prefetch-aware iteration","Throughput vs latency tradeoffs"],
 study:"The fastest hash tables in the world (abseil's flat_hash_map, Meta's F14, Jed Davis's hashmap) achieve near-memory-bandwidth performance via SIMD group probing, Robin Hood displacement, and fingerprint bytes for SIMD comparison. Reaching 1 billion operations/second on a single core requires integrating: SIMD, cache optimization, memory layout, and algorithmic insights all at once.",
 tasks:[
  ["Implement","Robin Hood hashing: on insert, if new element has longer probe distance than current occupant, swap and continue; on lookup, stop if current element has shorter probe distance than expected"],
  ["Build","SIMD group lookup: store 16 keys in a group; store 1 fingerprint byte per slot; use _mm_cmpeq_epi8 to check 16 fingerprints at once; only compare full key on fingerprint match"],
  ["Implement","Batch lookup: accept 16 keys at once; SIMD compute all hashes; prefetch all groups; SIMD compare all fingerprints; return 16 results; benchmark vs 16 sequential lookups"],

{n:143,title:"Mastery: End-to-End Robotics Pipeline",diff:"R",time:"10–12 h",prereqs:[92,93,94,95,97],
 concepts:["Complete perception-planning-control loop","Real-time guarantees","Failure mode analysis","Hardware-in-the-loop testing","ROS2 bags for regression","Latency breakdown analysis","Safety monitor"],
 study:"A complete robotics pipeline integrates: sensor drivers (real-time, DMA), perception (low latency, not 100% accurate), state estimation (Kalman, EKF), planning (safe trajectory), control (actuates hardware), and safety monitor (overrides if anything is wrong). Each stage has latency, uncertainty, and failure modes. The safety monitor must handle all failure combinations.",
 tasks:[
  ["Build","Complete ROS2 pipeline: LiDAR driver node → point cloud filter node → object detection node → EKF tracker node → planner node → controller node; measure end-to-end latency"],
  ["Instrument","Latency breakdown: add ROS2 timing to each message; log time spent in each node; identify bottleneck; optimize it; re-measure; document before/after"],
  ["Implement","Failure mode analysis: enumerate 10 failure modes (sensor dropout, computation overrun, actuator fault, etc.); implement detection for each; safe fallback for each; test each failure"],

 ]},
{n:144,title:"Mastery: Compiler Optimization — Your Own Passes",diff:"R",time:"8–10 h",prereqs:[65,116,117],
 concepts:["LLVM pass writing","Alias analysis","Loop optimizations (unroll, vectorize, fuse)","Interprocedural analysis","Whole-program optimization","Profile-guided specialization","Superoptimization preview"],
 study:"Writing custom LLVM passes lets you optimize patterns specific to your domain. Alias analysis determines when two pointers might point to the same memory — the foundation of vectorization. Loop unrolling reduces branch overhead. Loop fusion combines adjacent loops over the same range, improving cache behavior. Profile-guided specialization inlines the most common path.",

{n:145,title:"Mastery: Write a Spec-Compliant HTTP/1.1 + HTTP/2 Server",diff:"R",time:"10–12 h",prereqs:[62,84,46,67],
 concepts:["HTTP/1.1 (RFC 7230-7235)","Chunked transfer encoding","HTTP/2 (RFC 7540) multiplexing","HPACK header compression","HTTP/2 flow control","Server push","ALPN negotiation","HTTP/2 priority"],
 study:"HTTP/2 multiplexes multiple streams over one TCP connection — solving head-of-line blocking at the HTTP layer (though not TCP). HPACK uses a static table of common headers plus a dynamic table — headers seen previously are sent as 1-2 byte indices. HTTP/2 flow control operates at both stream level and connection level. Implementing this validates deep understanding of protocols, framing, compression, and concurrency.",
 tasks:[
  ["Implement","HTTP/1.1 parser: request line (method, URI, version), headers (field-name: field-value), body; chunked transfer encoding; content-length body; pipelining; test with RFC 7230 examples"],
  ["Build","HTTP/2 framing: parse HEADERS, DATA, SETTINGS, WINDOW_UPDATE, PING, RST_STREAM, GOAWAY frames; validate frame flags and stream IDs per RFC 7540 spec"],
  ["Implement","HPACK header compression: static table (61 entries); dynamic table with eviction; literal with/without indexing; huffman encoding/decoding; test RFC 7541 Appendix C examples"],
  ["Build","HTTP/2 stream multiplexing: multiple streams over one connection; each stream has flow control window; credit-based flow control; stream state machine (idle→open→half-closed→closed)"],
  ["Test","RFC compliance: run h2spec conformance test suite against your server; fix all failures; achieve 100% pass rate on mandatory tests; benchmark: 1000 concurrent HTTP/2 streams, measure throughput"]
 ]},
{n:146,title:"Mastery: Build a Generational GC with Precise Stack Scanning",diff:"R",time:"10–12 h",prereqs:[136,46,58],
 concepts:["Precise vs conservative stack scanning","LLVM stack maps for precise GC","Write barrier for generational invariant","Card tables","Remembered sets","Incremental marking","Safepoints","GC pause time SLAs"],
 study:"Precise GC requires knowing EXACTLY which stack slots contain pointers — requiring compiler cooperation. LLVM's statepoint/gc-relocate intrinsics generate stack maps. Card tables divide the heap into 512-byte cards — if a card is dirty (write happened), scan it for old-to-young pointers. This synthesizes: compiler integration, memory layout, concurrency, and systems programming.",
 tasks:[
  ["Implement","Conservative stack scanner: treat every word on stack as potential pointer; scan heap for object at that address; mark as live; measure false retention vs precise scanning"],

]; // end PHASES

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let doneSet = new Set();
try { doneSet = new Set(JSON.parse(localStorage.getItem('cpp_done_150_v1')||'[]')); } catch(e){}
let activeFilter = 'all';

function save() {
  try { localStorage.setItem('cpp_done_150_v1', JSON.stringify([...doneSet])); } catch(e){}
}

function allItems() {
  return PHASES.flatMap(p => p.items);
}

function updateStats() {
  const total = allItems().length;
  const done = doneSet.size;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done + ' / ' + total;
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  let html = '';
  const diffLabels = {B:'Beginner',I:'Intermediate',E:'Expert',R:'Research'};

  PHASES.forEach(phase => {
    const c = phase.col;
    html += `<div class="phase-hdr" data-phase="${phase.id}">
      <div class="ph-dot" style="background:${c}"></div>
      <span class="ph-label" style="color:${phase.txt}">${phase.label}</span>
      <div class="ph-meta">
        <span class="ph-count" style="color:${phase.txt}">${phase.items.length} checkpoints</span>
      </div>
    </div>`;

    if (phase.milestone) {
      const ms = phase.milestone;
      html += `<div class="milestone">
        <div class="ms-label">🏁 Phase Milestone</div>
        <div class="ms-title">${ms.title}</div>
        <div class="ms-desc">${ms.desc}</div>
        <div class="ms-items">${ms.items.map(i=>`<span class="ms-chip">${i}</span>`).join('')}</div>
      </div>`;
    }

    phase.items.forEach((item, idx) => {
      const isLast = idx === phase.items.length - 1;
      const done = doneSet.has(item.n);
      const searchTxt = [item.title, (item.concepts||[]).join(' '), item.study||'', (item.tasks||[]).map(t=>t[1]).join(' '), item.diff||'', phase.tag].join(' ').toLowerCase();
      const prereqStr = (item.prereqs||[]).join(',');

      html += `<div class="cp-row" data-n="${item.n}" data-diff="${item.diff||''}" data-done="${done?1:0}" data-search="${searchTxt}" data-prereq="${prereqStr}">
        <div class="spine">
          <div class="cp-num" style="background:${phase.bg};color:${phase.txt};border:1.5px solid ${c}50">${item.n}</div>
          ${!isLast?`<div class="cp-line" style="background:${c}18"></div>`:''}
        </div>
        <div class="card${done?' done':''}" id="card-${item.n}" style="--pcol:${c}">
          <style>#card-${item.n}::before{background:${c}}</style>
          <div class="card-top">
            <span class="cp-title" onclick="toggle(${item.n})">${item.n}. ${item.title}</span>
            <span class="cp-tag" style="background:${phase.bg};color:${phase.txt}">${phase.tag}</span>
            ${item.diff?`<span class="diff diff-${item.diff}">${diffLabels[item.diff]||item.diff}</span>`:''}
            ${item.time?`<span class="time-badge">⏱ ${item.time}</span>`:''}
            <div class="done-btn${done?' on':''}" id="db-${item.n}" onclick="toggleDone(${item.n})" title="Mark complete">✓</div>
            <span class="chev" id="chev-${item.n}" onclick="toggle(${item.n})">▶</span>
          </div>
          <div class="cp-topics" onclick="toggle(${item.n})">${(item.concepts||[]).slice(0,7).join(' · ')}</div>
          <div class="expand" id="exp-${item.n}">
            ${(item.prereqs||[]).length ? `
              <div class="sec-label">🔗 Prerequisites</div>
              <div class="prereq-row">${item.prereqs.map(p=>{
                const ref = allItems().find(x=>x.n===p);
                return `<span class="prereq-chip" onclick="scrollToN(${p})" title="Go to #${p}">#${p}${ref?' — '+ref.title:''}</span>`;
              }).join('')}</div>` : ''}
            ${item.study?`<div class="sec-label">📖 What to Study</div>
            <div class="study-text">${item.study}</div>`:''}
            ${(item.concepts||[]).length?`<div class="sec-label">🧩 Key Concepts</div>
            <div class="concept-row">${item.concepts.map(c=>`<span class="concept">${c}</span>`).join('')}</div>`:''}
            ${(item.tasks||[]).length?`<div class="sec-label">🔨 Tasks — Master This Checkpoint</div>
            <div class="tasks-wrap">${item.tasks.map(([v,d])=>`
              <div class="task">
                <span class="verb" style="background:${phase.bg};color:${phase.txt}">${v}</span>
                <span class="tdesc">${d}</span>
              </div>`).join('')}
            </div>`:''}
          </div>
        </div>
      </div>`;
    });
  });

  html += `<div class="capstone-box">
    <div class="cap-title">🏆 You've reached the end — 150 checkpoints completed. Now build something legendary.</div>
    <div class="cap-grid">
      ${[
        'x86-64 OS kernel → scheduler → VFS → userspace shell',
        'Raft KV store → fault tolerant → chaos tested',
        'HTTP/2 server → raw sockets → TLS → HPACK',
        'Lock-free library → MPMC/stack/hashmap → TSan clean',
        'CUDA DNN training → ResNet-20 on CIFAR-10 > 91%',
        'Full LiDAR SLAM → ROS2 → pose graph → loop closure',
        'Autoware AD stack → drive 1km in AWSIM autonomously',
        'Real-time transformer inference → GPT-2 < 5ms p99',
        'Columnar query engine → AVX2 predicates → Arrow format',
        'JIT compiler → emit x86-64 → run programs at native speed'
      ].map(p=>`<div class="cap-item"><span>▸</span><span>${p}</span></div>`).join('')}
    </div>
  </div>`;

  root.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────────────────────
function toggle(n) {
  const exp = document.getElementById('exp-'+n);
  const chev = document.getElementById('chev-'+n);
  if (!exp) return;
  const open = exp.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function toggleDone(n) {
  const db = document.getElementById('db-'+n);
  const card = document.getElementById('card-'+n);
  const row = card ? card.closest('.cp-row') : null;
  if (doneSet.has(n)) {
    doneSet.delete(n);
    if(db) db.classList.remove('on');
    if(card) card.classList.remove('done');
    if(row) row.dataset.done = '0';
  } else {
    doneSet.add(n);
    if(db) db.classList.add('on');
    if(card) card.classList.add('done');
    if(row) row.dataset.done = '1';
  }
  save();
  updateStats();
}

function scrollToN(n) {
  const row = document.querySelector(`.cp-row[data-n="${n}"]`);
  if (row) row.scrollIntoView({behavior:'smooth',block:'center'});
}

function applyFilters(searchQ) {
  const rows = document.querySelectorAll('.cp-row');
  const phaseHdrs = document.querySelectorAll('.phase-hdr');
  const milestones = document.querySelectorAll('.milestone');
  const q = (searchQ||'').toLowerCase().trim();

  rows.forEach(row => {
    let show = true;
    const diff = row.dataset.diff;
    const done = row.dataset.done === '1';
    const search = row.dataset.search || '';

    if (activeFilter === 'B' && diff !== 'B') show = false;
    else if (activeFilter === 'I' && diff !== 'I') show = false;
    else if (activeFilter === 'E' && diff !== 'E') show = false;
    else if (activeFilter === 'R' && diff !== 'R') show = false;
    else if (activeFilter === 'todo' && done) show = false;
    else if (activeFilter === 'done' && !done) show = false;

    if (show && q && !search.includes(q)) show = false;
    row.style.display = show ? '' : 'none';
  });

  phaseHdrs.forEach(hdr => {
    const id = hdr.dataset.phase;
    let sib = hdr.nextElementSibling;
    let hasVis = false;
    while (sib && !sib.classList.contains('phase-hdr')) {
      if (sib.classList.contains('cp-row') && sib.style.display !== 'none') { hasVis = true; break; }
      sib = sib.nextElementSibling;
    }
    hdr.style.display = hasVis ? '' : 'none';
  });

  milestones.forEach(ms => {
    const prev = ms.previousElementSibling;
    ms.style.display = (prev && prev.style.display !== 'none') ? '' : 'none';
  });

  const visible = [...rows].filter(r => r.style.display !== 'none').length;
  const mc = document.getElementById('match-cnt');
  mc.textContent = q || activeFilter !== 'all' ? visible + ' shown' : '';
}

function doSearch(q) { applyFilters(q); }

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters(document.getElementById('srch').value);
}

function expandAll() {
  document.querySelectorAll('.expand').forEach(e => e.classList.add('open'));
  document.querySelectorAll('.chev').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.expand').forEach(e => e.classList.remove('open'));
  document.querySelectorAll('.chev').forEach(c => c.classList.remove('open'));
}

function resetAll() {
  if (!confirm('Reset all 150 checkpoint progress? This cannot be undone.')) return;
  doneSet.clear();
  save();
  document.querySelectorAll('.done-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.card').forEach(c => c.classList.remove('done'));
  document.querySelectorAll('.cp-row').forEach(r => r.dataset.done = '0');
  updateStats();
}

render();
updateStats();
</script>
</body>
</html>
